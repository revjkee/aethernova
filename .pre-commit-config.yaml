default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
        files: ^(\.devcontainer/devcontainer\.json|frontend/(package(-lock)?\.json|public/manifest\.json))$
        exclude: ^(agent_mash/tests/test_data/(invalid|edge_cases)/|archive/)
      - id: check-toml
        files: ^pyproject\.toml$
      - id: check-yaml
        files: ^(\.github/|docker-compose\.yml|monitoring/)
        exclude: ^(archive/|docs/legacy/)
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^(backend|tools|tests)/.*\.py$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^(backend|tools|tests)/.*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        files: ^(backend|tools|tests)/.*\.py$
        args: [--max-line-length=100]

  - repo: https://github.com/pycqa/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-q, -r, backend/src]
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: local
    hooks:
      - id: repository-audit
        name: Repository contract audit
        entry: python tools/repository_audit.py
        language: system
        pass_filenames: false

      - id: validate-docker-compose
        name: Validate Docker Compose
        entry: docker compose config --quiet
        language: system
        pass_filenames: false
        files: ^(docker-compose\.yml|Dockerfile|\.env\.example)$
