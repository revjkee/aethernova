minimum_pre_commit_version: "3.2.0"

default_install_hook_types:
  - pre-commit
  - pre-push

default_stages:
  - pre-commit

default_language_version:
  python: python3

fail_fast: false

exclude: |
  (?x)^(
      \.git/|
      \.hg/|
      \.svn/|
      \.mypy_cache/|
      \.pytest_cache/|
      \.ruff_cache/|
      \.tox/|
      \.nox/|
      \.venv/|
      venv/|
      env/|
      __pycache__/|
      build/|
      dist/|
      htmlcov/|
      coverage/|
      node_modules/|
      frontend/node_modules/|
      frontend/dist/|
      staticfiles/|
      public/build/|
      media/|
      tmp/|
      temp/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict

      - id: end-of-file-fixer
        exclude: "^.*\\.(svg)$"

      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md

      - id: mixed-line-ending
        args:
          - --fix=lf

      - id: check-yaml
        args:
          - --allow-multiple-documents

      - id: check-toml

      - id: check-json

      - id: debug-statements

      - id: check-ast

      - id: check-docstring-first

      - id: check-case-conflict

      - id: check-executables-have-shebangs

      - id: destroyed-symlinks

      - id: check-added-large-files
        args:
          - --maxkb=2048

      - id: check-byte-order-marker

      - id: requirements-txt-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        name: ruff lint
        args:
          - --fix
          - --exit-non-zero-on-fix

      - id: ruff-format
        name: ruff format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project environment)
        entry: python -m mypy --config-file mypy.ini .
        language: system
        pass_filenames: false
        require_serial: true
        stages:
          - pre-push
          - manual
        types_or:
          - python
          - pyi

      - id: pytest-unit
        name: pytest unit
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        stages:
          - manual