[pytest]
minversion = 8.0

addopts =
    -ra
    --strict-config
    --strict-markers
    --tb=short
    --showlocals

testpaths =
    tests

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*
    Describe*

python_functions =
    test_*

xfail_strict = true
junit_family = xunit2

filterwarnings =
    error

markers =
    unit: быстрые unit-тесты без внешних зависимостей
    integration: интеграционные тесты с БД, Redis, HTTP и другими сервисами
    e2e: сквозные end-to-end тесты
    smoke: базовая проверка критического пути
    slow: длительные тесты
    db: тесты, работающие с базой данных
    api: тесты HTTP API
    auth: тесты аутентификации и авторизации
    booking: тесты сценариев бронирования
    payments: тесты платежных сценариев
    notifications: тесты уведомлений
    admin: тесты административного контура
    migration: тесты миграций и схемы БД

norecursedirs =
    .git
    .hg
    .mypy_cache
    .pytest_cache
    .ruff_cache
    .tox
    .venv
    venv
    build
    dist
    node_modules