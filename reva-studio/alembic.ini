# reva-studio/alembic.ini

[alembic]
# Path to migration scripts directory.
# %(here)s points to the directory where this alembic.ini file is located.
script_location = %(here)s/alembic

# Migration filename template.
# Example:
# 2026_03_22_054500_ab12cd34ef56_create_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Add project root to sys.path so Alembic can import app modules and metadata.
prepend_sys_path = .

# Alembic 1.16+ path splitting behavior.
# "os" means use os.pathsep and avoids Windows path parsing issues.
path_separator = os

# Render revision timestamps in UTC for deterministic history across environments.
timezone = UTC

# Limit slug length in generated migration filenames.
truncate_slug_length = 40

# Usually false for production projects unless env.py must always run on "revision".
revision_environment = false

# Only use source .py revision files.
sourceless = false

# Default single versions directory.
version_locations = %(here)s/alembic/versions

# Keep disabled unless you intentionally use nested revision folders.
recursive_version_locations = false

# Encoding used for generated revision files.
output_encoding = utf-8

# Placeholder URL.
# In a production setup, env.py should usually override this from environment variables.
# Example:
# sqlalchemy.url = postgresql+psycopg://reva_user:strong_password@localhost:5432/reva_studio
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Optional formatter hook example.
# Enable only if Black is installed in the same environment.
#
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(asctime)s | %(levelname)-5.5s | %(name)s | %(message)s
datefmt = %Y-%m-%d %H:%M:%S