openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

info:
  title: Reva Studio Internal API
  version: 1.0.0
  summary: Internal service-to-service API contract for Reva Studio
  description: |
    Internal API contract for Reva Studio bounded contexts and platform services.

    This contract is intended for:
      - backend internal services
      - admin/backoffice integrations
      - asynchronous workers
      - observability, audit and support tooling

    This document is not intended to be exposed as a public client API.

  contact:
    name: Reva Studio Engineering
    email: engineering@reva-studio.internal

servers:
  - url: https://internal.api.reva-studio.local
    description: Production internal gateway
  - url: https://stage.internal.api.reva-studio.local
    description: Staging internal gateway
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
    description: Service health, readiness and metadata
  - name: Auth
    description: Internal authentication and session inspection
  - name: Tenants
    description: Tenant metadata and configuration
  - name: Staff
    description: Staff management within tenant scope
  - name: Clients
    description: Client profiles within tenant scope
  - name: Services
    description: Service catalog and categories
  - name: Bookings
    description: Appointment lifecycle and scheduling
  - name: Loyalty
    description: Bonus accounts and transactions
  - name: Notifications
    description: Internal notification dispatch and preview
  - name: Audit
    description: Audit trail and internal compliance records
  - name: Webhooks
    description: Internal event delivery callbacks

security:
  - bearerAuth: []

paths:
  /internal/v1/health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"

  /internal/v1/health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service dependencies are not ready
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /internal/v1/meta:
    get:
      tags: [Health]
      summary: Service metadata
      operationId: getServiceMetadata
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceMetadata"

  /internal/v1/auth/session:
    get:
      tags: [Auth]
      summary: Inspect current internal session
      operationId: getCurrentSession
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/XCorrelationId"
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /internal/v1/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      operationId: listTenants
      parameters:
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SearchQuery"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TenantStatus"
      responses:
        "200":
          description: Tenant page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantPage"

    post:
      tags: [Tenants]
      summary: Create tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/tenants/{tenantId}:
    get:
      tags: [Tenants]
      summary: Get tenant by ID
      operationId: getTenantById
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Tenants]
      summary: Update tenant
      operationId: updateTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/tenants/{tenantId}/settings:
    get:
      tags: [Tenants]
      summary: Get tenant settings
      operationId: getTenantSettings
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"

    put:
      tags: [Tenants]
      summary: Replace tenant settings
      operationId: replaceTenantSettings
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSettingsWrite"
      responses:
        "200":
          description: Tenant settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"
        "400":
          $ref: "#/components/responses/ValidationError"

  /internal/v1/staff:
    get:
      tags: [Staff]
      summary: List staff
      operationId: listStaff
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SearchQuery"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StaffStatus"
      responses:
        "200":
          description: Staff page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPage"
        "400":
          $ref: "#/components/responses/ValidationError"

    post:
      tags: [Staff]
      summary: Create staff member
      operationId: createStaff
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/staff/{staffId}:
    get:
      tags: [Staff]
      summary: Get staff member
      operationId: getStaffById
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/StaffId"
      responses:
        "200":
          description: Staff details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Staff]
      summary: Update staff member
      operationId: updateStaff
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/StaffId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateStaffRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffRequest"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/clients:
    get:
      tags: [Clients]
      summary: List clients
      operationId: listClients
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SearchQuery"
        - name: phone
          in: query
          required: false
          schema:
            type: string
            maxLength: 32
      responses:
        "200":
          description: Client page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPage"

    post:
      tags: [Clients]
      summary: Create client
      operationId: createClient
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/clients/{clientId}:
    get:
      tags: [Clients]
      summary: Get client
      operationId: getClientById
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Clients]
      summary: Update client
      operationId: updateClient
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ClientId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/services:
    get:
      tags: [Services]
      summary: List catalog services
      operationId: listServices
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SearchQuery"
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Services page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicePage"

    post:
      tags: [Services]
      summary: Create catalog service
      operationId: createService
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/services/{serviceId}:
    get:
      tags: [Services]
      summary: Get service
      operationId: getServiceById
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ServiceId"
      responses:
        "200":
          description: Service details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Services]
      summary: Update service
      operationId: updateService
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ServiceId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/bookings:
    get:
      tags: [Bookings]
      summary: List bookings
      operationId: listBookings
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: staffId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: clientId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: Booking page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingPage"

    post:
      tags: [Bookings]
      summary: Create booking
      operationId: createBooking
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Time slot conflict or idempotency conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /internal/v1/bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Get booking
      operationId: getBookingById
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/BookingId"
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Bookings]
      summary: Update booking
      operationId: updateBooking
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/BookingId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingRequest"
      responses:
        "200":
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/bookings/{bookingId}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      operationId: cancelBooking
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/BookingId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/loyalty/accounts/{clientId}:
    get:
      tags: [Loyalty]
      summary: Get loyalty account by client
      operationId: getLoyaltyAccountByClientId
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ClientId"
      responses:
        "200":
          description: Loyalty account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyAccount"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/v1/loyalty/transactions:
    post:
      tags: [Loyalty]
      summary: Create loyalty transaction
      operationId: createLoyaltyTransaction
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoyaltyTransactionRequest"
      responses:
        "201":
          description: Loyalty transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyTransaction"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /internal/v1/notifications/preview:
    post:
      tags: [Notifications]
      summary: Render notification preview
      operationId: previewNotification
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreviewRequest"
      responses:
        "200":
          description: Notification preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreview"

  /internal/v1/audit/events:
    get:
      tags: [Audit]
      summary: List audit events
      operationId: listAuditEvents
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: actorId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Audit event page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventPage"

webhooks:
  booking.created:
    post:
      tags: [Webhooks]
      summary: Booking created event
      operationId: webhookBookingCreated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreatedEvent"
      responses:
        "202":
          description: Event accepted

  booking.cancelled:
    post:
      tags: [Webhooks]
      summary: Booking cancelled event
      operationId: webhookBookingCancelled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCancelledEvent"
      responses:
        "202":
          description: Event accepted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal JWT bearer token
    serviceApiKey:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Internal service-to-service API key

  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier
      schema:
        type: string
        format: uuid

    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      description: Active tenant identifier
      schema:
        type: string
        format: uuid

    StaffId:
      name: staffId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageNumber:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

    SearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255

    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128

    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 255

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    Forbidden:
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    Conflict:
      description: Resource conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Problem"
              - type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValidationIssue"

  schemas:
    Problem:
      type: object
      description: Problem Details for HTTP APIs
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          maxLength: 128
        traceId:
          type: string
          maxLength: 128
      required:
        - title
        - status
      additionalProperties: true

    ValidationIssue:
      type: object
      properties:
        field:
          type: string
          maxLength: 255
        message:
          type: string
          maxLength: 1000
        code:
          type: string
          maxLength: 128
      required:
        - field
        - message
      additionalProperties: false

    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
