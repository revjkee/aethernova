components:
  parameters:
    XRevaEvent:
      name: X-Reva-Event
      in: header
      required: true
      description: Canonical event type.
      schema:
        type: string
        enum:
          - booking.created
          - booking.updated
          - booking.cancelled
          - payment.succeeded
          - loyalty.balance.updated

    XRevaEventId:
      name: X-Reva-Event-Id
      in: header
      required: true
      description: Stable event identifier. Same logical event keeps the same event ID across retries.
      schema:
        type: string
        format: uuid

    XRevaDeliveryId:
      name: X-Reva-Delivery-Id
      in: header
      required: true
      description: Unique delivery attempt identifier. Changes on each retry attempt.
      schema:
        type: string
        format: uuid

    XRevaAttempt:
      name: X-Reva-Attempt
      in: header
      required: true
      description: Current delivery attempt number. Starts at 1.
      schema:
        type: integer
        minimum: 1
        maximum: 1000

    XRevaTimestamp:
      name: X-Reva-Timestamp
      in: header
      required: true
      description: UNIX timestamp in seconds used in signature computation.
      schema:
        type: integer
        minimum: 1
        examples: [1742685600]

    XRevaSignature:
      name: X-Reva-Signature
      in: header
      required: true
      description: |
        HMAC-SHA256 signature of "<timestamp>.<raw_body>" encoded as lowercase hex and prefixed with "sha256=".
        Example: sha256=9f3c...
      schema:
        type: string
        pattern: '^sha256=[A-Fa-f0-9]{64}$'

    XRevaApiVersion:
      name: X-Reva-Api-Version
      in: header
      required: true
      description: Webhook contract version used to serialize this payload.
      schema:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
        examples: ['2026-03-22']

    XRevaTenantId:
      name: X-Reva-Tenant-Id
      in: header
      required: true
      description: Tenant identifier owning the emitted event.
      schema:
        type: string
        format: uuid

  responses:
    WebhookAccepted:
      description: |
        Delivery accepted.
        Return 2xx only after signature verification and safe enqueue or commit of idempotent processing.
      headers:
        X-Consumer-Receipt-Id:
          description: Optional consumer-side receipt ID for observability.
          schema:
            type: string
            maxLength: 128
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookAck'
          examples:
            default:
              value:
                received: true
                status: accepted
                message: event accepted for processing

    WebhookRejected:
      description: Delivery rejected due to invalid request, signature, authorization, or payload semantics.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookError'
          examples:
            default:
              value:
                received: false
                status: rejected
                code: invalid_signature
                message: signature verification failed

    WebhookConflict:
      description: Duplicate or conflicting delivery detected by the consumer.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookError'
          examples:
            default:
              value:
                received: true
                status: duplicate
                code: duplicate_delivery
                message: delivery already processed

    WebhookRetryLater:
      description: Temporary failure. Reva Studio may retry according to delivery policy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookError'
          examples:
            default:
              value:
                received: false
                status: retry_later
                code: temporary_unavailable
                message: downstream dependency unavailable

    WebhookGone:
      description: Endpoint is permanently unavailable and may be automatically disabled after policy threshold.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookError'
          examples:
            default:
              value:
                received: false
                status: gone
                code: endpoint_removed
                message: endpoint no longer exists

  schemas:
    EventEnvelope:
      type: object
      additionalProperties: false
      required:
        - id
        - type
        - version
        - occurred_at
        - created_at
        - tenant_id
        - livemode
        - attempt
        - delivery_id
        - data
      properties:
        id:
          type: string
          format: uuid
          description: Stable logical event ID.
        type:
          type: string
          description: Canonical event type.
        version:
          type: string
          description: Event schema version.
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
          examples: ['1.0.0']
        occurred_at:
          type: string
          format: date-time
          description: Time the business event occurred.
        created_at:
          type: string
          format: date-time
          description: Time the webhook event record was created for delivery.
        tenant_id:
          type: string
          format: uuid
        livemode:
          type: boolean
          description: False in sandbox, true in production.
        attempt:
          type: integer
          minimum: 1
        delivery_id:
          type: string
          format: uuid
          description: Unique identifier for this delivery attempt.
        correlation_id:
          type:
            - string
            - 'null'
          maxLength: 128
        trace_id:
          type:
            - string
            - 'null'
          maxLength: 128
        idempotency_key:
          type:
            - string
            - 'null'
          maxLength: 128
          description: Optional producer-side deduplication key.
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: false
          properties:
            source:
              type: string
              maxLength: 128
            emitted_by:
              type: string
              maxLength: 128

    Money:
      type: object
      additionalProperties: false
      required:
        - amount
        - currency
      properties:
        amount:
          type: integer
          description: Amount in minor units.
          minimum: 0
          examples: [6500]
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          examples: ['RUB', 'EUR', 'USD']

    Booking:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - client_id
        - staff_id
        - service_id
        - status
        - starts_at
        - ends_at
        - price
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        staff_id:
          type: string
          format: uuid
        service_id:
          type: string
          format: uuid
        salon_location_id:
          type:
            - string
            - 'null'
          format: uuid
        status:
          type: string
          enum:
            - pending
            - confirmed
            - completed
            - cancelled
            - no_show
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        notes:
          type:
            - string
            - 'null'
          maxLength: 4000
        price:
          $ref: '#/components/schemas/Money'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Payment:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - booking_id
        - client_id
        - status
        - method
        - amount
        - paid_at
        - created_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        booking_id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - succeeded
            - failed
            - refunded
            - partially_refunded
        method:
          type: string
          enum:
            - cash
            - card
            - online
            - terminal
            - transfer
            - mixed
        amount:
          $ref: '#/components/schemas/Money'
        paid_at:
          type:
            - string
            - 'null'
          format: date-time
        external_reference:
          type:
            - string
            - 'null'
          maxLength: 255
        created_at:
          type: string
          format: date-time

    LoyaltyBalance:
      type: object
      additionalProperties: false
      required:
        - client_id
        - tenant_id
        - balance
        - delta
        - reason
        - updated_at
      properties:
        client_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        balance:
          type: integer
          minimum: 0
        delta:
          type: integer
        reason:
          type: string
          enum:
            - booking_completed
            - booking_cancelled
            - manual_adjustment
            - refund
            - campaign_bonus
            - redemption
            - expiration
        updated_at:
          type: string
          format: date-time

    BookingCreatedData:
      type: object
      additionalProperties: false
      required:
        - booking
      properties:
        booking:
          $ref: '#/components/schemas/Booking'

    BookingUpdatedData:
      type: object
      additionalProperties: false
      required:
        - booking
        - previous
        - changes
      properties:
        booking:
          $ref: '#/components/schemas/Booking'
        previous:
          $ref: '#/components/schemas/Booking'
        changes:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 128
          examples:
            - [starts_at, staff_id, notes]

    BookingCancelledData:
      type: object
      additionalProperties: false
      required:
        - booking
        - cancelled_by
        - cancelled_at
      properties:
        booking:
          $ref: '#/components/schemas/Booking'
        cancelled_by:
          type: string
          enum:
            - client
            - staff
            - manager
            - system
        cancelled_at:
          type: string
          format: date-time
        reason:
          type:
            - string
            - 'null'
          maxLength: 1000

    PaymentSucceededData:
      type: object
      additionalProperties: false
      required:
        - payment
      properties:
        payment:
          $ref: '#/components/schemas/Payment'

    LoyaltyBalanceUpdatedData:
      type: object
      additionalProperties: false
      required:
        - loyalty
      properties:
        loyalty:
          $ref: '#/components/schemas/LoyaltyBalance'

    BookingCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          additionalProperties: false
          properties:
            type:
              const: booking.created
            data:
              $ref: '#/components/schemas/BookingCreatedData'

    BookingUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          additionalProperties: false
          properties:
            type:
              const: booking.updated
            data:
              $ref: '#/components/schemas/BookingUpdatedData'

    BookingCancelledEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          additionalProperties: false
          properties:
            type:
              const: booking.cancelled
            data:
              $ref: '#/components/schemas/BookingCancelledData'

    PaymentSucceededEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          additionalProperties: false
          properties:
            type:
              const: payment.succeeded
            data:
              $ref: '#/components/schemas/PaymentSucceededData'

    LoyaltyBalanceUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          additionalProperties: false
          properties:
            type:
              const: loyalty.balance.updated
            data:
              $ref: '#/components/schemas/LoyaltyBalanceUpdatedData'

    WebhookAck:
      type: object
      additionalProperties: false
      required:
        - received
        - status
      properties:
        received:
          type: boolean
          const: true
        status:
          type: string
          enum: [accepted]
        message:
          type:
            - string
            - 'null'
          maxLength: 255

    WebhookError:
      type: object
      additionalProperties: false
      required:
        - received
        - status
        - code
      properties:
        received:
          type: boolean
        status:
          type: string
          enum:
            - rejected
            - duplicate
            - retry_later
            - gone
        code:
          type: string
          maxLength: 128
        message:
          type:
            - string
            - 'null'
          maxLength: 500
        retryable:
          type:
            - boolean
            - 'null'

  examples:
    BookingCreatedExample:
      value:
        id: 87c4aadb-a657-4a5d-9560-4e5034f005f0
        type: booking.created
        version: 1.0.0
        occurred_at: '2026-03-22T10:30:15Z'
        created_at: '2026-03-22T10:30:16Z'
        tenant_id: 645df9a4-36be-4b9b-a6b9-2e90a8c2f0a1
        livemode: true
        attempt: 1
        delivery_id: 98ad86b5-36ce-4cca-9181-695273af669c
        correlation_id: req_01HQV0Y64Y4B0PT5G5Y5YXT1JJ
        trace_id: trc_01HQV0Y64Y4B0PT5G5Y5YXT1JJ
        idempotency_key: bkg_01HQV0VN4C5SXY2N7Y4D4R2F64
        data:
          booking:
            id: 9ca1b1f7-e4ee-4f8c-89aa-7af7496c8442
            tenant_id: 645df9a4-36be-4b9b-a6b9-2e90a8c2f0a1
            client_id: 45e79e3d-0b50-4ce4-ae88-ef53aa44cbde
            staff_id: 8a4cb4aa-d8de-43a4-a919-f7d0d4440a89
            service_id: 8e6300f0-4c2f-465d-9ea0-148d7167384f
            salon_location_id: 9f214d33-cf59-4d44-a044-372d92a44f9c
            status: confirmed
            starts_at: '2026-03-24T12:00:00Z'
            ends_at: '2026-03-24T13:30:00Z'
            notes: First visit
            price:
              amount: 6500
              currency: RUB
            created_at: '2026-03-22T10:30:15Z'
            updated_at: '2026-03-22T10:30:15Z'

