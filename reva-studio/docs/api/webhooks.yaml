  loyalty.balance.updated:
    post:
      tags: [Webhooks]
      operationId: webhookLoyaltyBalanceUpdated
      summary: Loyalty balance updated
      description: Sent when a client's loyalty balance changes.
      parameters:
        - $ref: '#/components/parameters/XRevaEvent'
        - $ref: '#/components/parameters/XRevaEventId'
        - $ref: '#/components/parameters/XRevaDeliveryId'
        - $ref: '#/components/parameters/XRevaAttempt'
        - $ref: '#/components/parameters/XRevaTimestamp'
        - $ref: '#/components/parameters/XRevaSignature'
        - $ref: '#/components/parameters/XRevaApiVersion'
