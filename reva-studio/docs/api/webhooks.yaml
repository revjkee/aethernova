        - $ref: '#/components/parameters/XRevaAttempt'
        - $ref: '#/components/parameters/XRevaTimestamp'
        - $ref: '#/components/parameters/XRevaSignature'
        - $ref: '#/components/parameters/XRevaApiVersion'
        - $ref: '#/components/parameters/XRevaTenantId'
