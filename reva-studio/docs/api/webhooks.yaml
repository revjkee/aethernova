openapi: 3.1.0
info:
  title: Reva Studio Webhooks API
  version: 1.0.0
  summary: Outbound webhook contract for Reva Studio integrations
  description: |
    This document defines outbound webhook events sent by Reva Studio to partner systems,
    internal integrations, analytics consumers, and automation endpoints.

    Delivery model:
      - HTTPS only
      - At-least-once delivery
      - Consumers must implement idempotent event processing
      - Consumers must verify HMAC-SHA256 signatures
      - Consumers must reject stale timestamps and replayed deliveries

    Signature model:
      Reva Studio signs the exact raw HTTP request body with HMAC-SHA256 using the webhook secret.

      Signature base string:
        <timestamp>.<raw_body>

      Recommended verification flow:
        1. Read the raw body without mutation
        2. Read X-Reva-Timestamp
        3. Compute HMAC_SHA256(secret, "<timestamp>.<raw_body>")
        4. Compare with X-Reva-Signature using constant-time comparison
        5. Reject if timestamp is outside the allowed skew window
        6. Reject already processed delivery IDs

      This file is intentionally contract-first and suitable for code generation, review,
      gateway policy alignment, and partner documentation.

jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

servers:
  - url: https://api.revastudio.app
    description: Production
  - url: https://sandbox-api.revastudio.app
    description: Sandbox

tags:
  - name: Webhooks
    description: Outbound event contracts delivered by Reva Studio

externalDocs:
  description: Reva Studio architecture docs
  url: https://api.revastudio.app/docs

webhooks:
  booking.created:
    post:
      tags: [Webhooks]
      operationId: webhookBookingCreated
      summary: Booking created
      description: |
        Sent when a booking is successfully created and persisted.
        This event is emitted after the booking becomes visible in the source of truth.
      parameters:
        - $ref: '#/components/parameters/XRevaEvent'
        - $ref: '#/components/parameters/XRevaEventId'
        - $ref: '#/components/parameters/XRevaDeliveryId'
        - $ref: '#/components/parameters/XRevaAttempt'
        - $ref: '#/components/parameters/XRevaTimestamp'
        - $ref: '#/components/parameters/XRevaSignature'
        - $ref: '#/components/parameters/XRevaApiVersion'
        - $ref: '#/components/parameters/XRevaTenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreatedEvent'
            examples:
              default:
                $ref: '#/components/examples/BookingCreatedExample'
      responses:
        '200':
          $ref: '#/components/responses/WebhookAccepted'
        '202':
          $ref: '#/components/responses/WebhookAccepted'
        '400':
          $ref: '#/components/responses/WebhookRejected'
        '401':
          $ref: '#/components/responses/WebhookRejected'
        '403':
          $ref: '#/components/responses/WebhookRejected'
        '409':
          $ref: '#/components/responses/WebhookConflict'
        '410':
          $ref: '#/components/responses/WebhookGone'
        '429':
          $ref: '#/components/responses/WebhookRetryLater'
        '500':
          $ref: '#/components/responses/WebhookRetryLater'
        '502':
          $ref: '#/components/responses/WebhookRetryLater'
        '503':
          $ref: '#/components/responses/WebhookRetryLater'
        '504':
          $ref: '#/components/responses/WebhookRetryLater'

  booking.updated:
    post:
      tags: [Webhooks]
      operationId: webhookBookingUpdated
      summary: Booking updated
      description: Sent when a booking is updated.
      parameters:
