openapi: 3.1.0
info:
  title: Reva Studio Admin API
  version: 1.0.0
  summary: Administrative API for Reva Studio beauty SaaS platform
  description: |
    Production-grade administrative API for Reva Studio.

    Scope:
      - admin authentication and session lifecycle
      - dashboard and operational summaries
      - customer management
      - staff management
      - services catalog management
      - booking operations
      - loyalty operations
      - promotions
      - notifications
      - audit events
      - platform settings

    Conventions:
      - all timestamps are RFC 3339 date-time strings in UTC
      - all identifiers are UUID strings unless stated otherwise
      - pagination uses cursor or offset/limit depending on endpoint
      - mutating operations may require Idempotency-Key header
      - all protected endpoints require Bearer authentication
  contact:
    name: Reva Studio Platform Team
  license:
    name: Proprietary
servers:
  - url: https://api.revastudio.local/admin/v1
    description: Local gateway
  - url: https://staging-api.revastudio.com/admin/v1
    description: Staging
  - url: https://api.revastudio.com/admin/v1
    description: Production

tags:
  - name: Auth
    description: Administrative authentication and token lifecycle
  - name: Dashboard
    description: Operational summaries and KPIs for admin console
  - name: Customers
    description: Customer management
  - name: Staff
    description: Staff accounts, roles, schedules and availability
  - name: Services
    description: Services catalog administration
  - name: Bookings
    description: Booking lifecycle administration
  - name: Loyalty
    description: Loyalty balances, ledger and manual adjustments
  - name: Promotions
    description: Campaign and promotion management
  - name: Notifications
    description: Notification previewing, broadcasting and history
  - name: Audit
    description: Audit trail and security-sensitive events
  - name: Settings
    description: Tenant and platform settings

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in as admin
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token pair
      operationId: adminRefreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthTokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      operationId: adminLogout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current admin profile
      operationId: getCurrentAdminProfile
      responses:
        '200':
          description: Current authenticated admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get dashboard summary
      operationId: getDashboardSummary
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: from
          in: query
          required: false
          description: Start of interval
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: End of interval
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customers:
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - name: loyalty_tier
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LoyaltyTier'
        - name: created_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customers/{customer_id}:
    get:
      tags: [Customers]
      summary: Get customer details
      operationId: getCustomerById
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Customers]
      summary: Update customer profile
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdateRequest'
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /customers/{customer_id}/status:
    patch:
      tags: [Customers]
      summary: Change customer active status
      operationId: setCustomerStatus
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerStatusUpdateRequest'
      responses:
        '200':
          description: Customer status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /staff:
    get:
      tags: [Staff]
      summary: List staff members
      operationId: listStaff
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/StaffRole'
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
      responses:
        '200':
          description: Staff list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Staff]
      summary: Create staff member
      operationId: createStaff
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffCreateRequest'
      responses:
        '201':
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /staff/{staff_id}:
    get:
      tags: [Staff]
      summary: Get staff member
      operationId: getStaffById
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StaffId'
      responses:
        '200':
          description: Staff member details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Staff]
      summary: Update staff member
      operationId: updateStaff
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StaffId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffUpdateRequest'
      responses:
        '200':
          description: Staff member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /staff/{staff_id}/schedule:
    put:
      tags: [Staff]
      summary: Replace staff weekly schedule
      operationId: replaceStaffSchedule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StaffId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffScheduleReplaceRequest'
      responses:
        '200':
          description: Schedule replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffSchedule'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /staff/{staff_id}/availability:
    get:
      tags: [Staff]
      summary: Get staff availability for interval
      operationId: getStaffAvailability
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StaffId'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: service_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Availability slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /services:
    get:
      tags: [Services]
      summary: List services
      operationId: listServices
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: category
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
      responses:
        '200':
          description: Service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Services]
      summary: Create service
      operationId: createService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /services/{service_id}:
    get:
      tags: [Services]
      summary: Get service
      operationId: getServiceById
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Services]
      summary: Update service
      operationId: updateService
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ServiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings:
    get:
      tags: [Bookings]
      summary: List bookings
      operationId: listBookings
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - name: staff_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: service_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Bookings]
      summary: Create booking
      operationId: createBooking
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Booking conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingConflictError'

  /bookings/{booking_id}:
    get:
      tags: [Bookings]
      summary: Get booking details
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Bookings]
      summary: Update booking
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingUpdateRequest'
      responses:
        '200':
          description: Booking updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Booking conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingConflictError'

  /bookings/{booking_id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCancelRequest'
      responses:
        '200':
          description: Booking canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings/{booking_id}/check-in:
    post:
      tags: [Bookings]
      summary: Check in customer
      operationId: checkInBooking
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Booking checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{booking_id}/complete:
    post:
      tags: [Bookings]
      summary: Complete booking
      operationId: completeBooking
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCompleteRequest'
      responses:
        '200':
          description: Booking completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/{booking_id}/no-show:
    post:
      tags: [Bookings]
      summary: Mark booking as no-show
      operationId: markBookingNoShow
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BookingId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoShowRequest'
      responses:
        '200':
          description: Booking marked as no-show
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /loyalty/accounts:
    get:
      tags: [Loyalty]
      summary: List loyalty accounts
      operationId: listLoyaltyAccounts
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tier
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LoyaltyTier'
      responses:
        '200':
          description: Loyalty account list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /loyalty/accounts/{customer_id}:
    get:
      tags: [Loyalty]
      summary: Get loyalty account for customer
      operationId: getLoyaltyAccount
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Loyalty account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccountDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /loyalty/accounts/{customer_id}/adjustments:
    post:
      tags: [Loyalty]
      summary: Apply manual loyalty adjustment
      operationId: createLoyaltyAdjustment
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyAdjustmentRequest'
      responses:
        '201':
          description: Adjustment applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyLedgerEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /promotions:
    get:
      tags: [Promotions]
      summary: List promotions
      operationId: listPromotions
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PromotionStatus'
      responses:
        '200':
          description: Promotion list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Promotions]
      summary: Create promotion
      operationId: createPromotion
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionCreateRequest'
      responses:
        '201':
          description: Promotion created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /promotions/{promotion_id}:
    get:
      tags: [Promotions]
      summary: Get promotion
      operationId: getPromotionById
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PromotionId'
      responses:
        '200':
          description: Promotion details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Promotions]
      summary: Update promotion
      operationId: updatePromotion
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/PromotionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionUpdateRequest'
      responses:
        '200':
          description: Promotion updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/broadcasts/preview:
    post:
      tags: [Notifications]
      summary: Preview broadcast audience and content normalization
      operationId: previewBroadcast
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastPreviewRequest'
      responses:
        '200':
          description: Broadcast preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastPreviewResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/broadcasts:
    get:
      tags: [Notifications]
      summary: List broadcast jobs
      operationId: listBroadcastJobs
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Broadcast list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastJobListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Notifications]
      summary: Create broadcast job
      operationId: createBroadcastJob
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastCreateRequest'
      responses:
        '202':
          description: Broadcast accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastJob'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /audit/events:
    get:
      tags: [Audit]
      summary: List audit events
      operationId: listAuditEvents
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settings:
    get:
      tags: [Settings]
      summary: Get tenant settings
      operationId: getSettings
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Settings]
      summary: Update tenant settings
      operationId: updateSettings
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      description: Tenant identifier for scoped admin operations
      schema:
        type: string
        format: uuid

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Unique idempotency key for safely retrying mutation requests
      schema:
        type: string
        minLength: 8
        maxLength: 128

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    StaffId:
      name: staff_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServiceId:
      name: service_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    BookingId:
      name: booking_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PromotionId:
      name: promotion_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication failed or token is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Request validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    UUID:
      type: string
      format: uuid

    DateTime:
      type: string
      format: date-time

    PhoneNumber:
      type: string
      minLength: 6
      maxLength: 32

    CurrencyCode:
      type: string
      pattern: '^[A-Z]{3}$'
      examples: [RUB, EUR, USD]

    LocaleCode:
      type: string
      examples: [ru-RU, en-US]

    PaginationMeta:
      type: object
      additionalProperties: false
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          maxLength: 64
          examples: [validation_error]
        message:
          type: string
          maxLength: 500
        field:
          type:
            - string
            - 'null'
          maxLength: 120

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type:
            - string
            - 'null'
          maxLength: 128
        timestamp:
          $ref: '#/components/schemas/DateTime'

    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required: [error, details]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        request_id:
          type:
            - string
            - 'null'
          maxLength: 128
        timestamp:
          $ref: '#/components/schemas/DateTime'

    Money:
      type: object
      additionalProperties: false
      required: [amount_minor, currency]
      properties:
        amount_minor:
          type: integer
          description: Minor units, for example kopecks or cents
        currency:
          $ref: '#/components/schemas/CurrencyCode'

    AdminPermission:
      type: string
      enum:
        - dashboard:read
        - customers:read
        - customers:write
        - staff:read
        - staff:write
        - services:read
        - services:write
        - bookings:read
        - bookings:write
        - loyalty:read
        - loyalty:write
        - promotions:read
        - promotions:write
        - notifications:read
        - notifications:write
        - audit:read
        - settings:read
        - settings:write

    StaffRole:
      type: string
      enum:
        - owner
        - admin
        - manager
        - master
        - support

    AdminLoginRequest:
      type: object
      additionalProperties: false
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 3
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 256
        remember_me:
          type: boolean
          default: false

    AdminAuthTokenPair:
      type: object
      additionalProperties: false
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
        - refresh_expires_in
        - admin
      properties:
        access_token:
          type: string
          minLength: 20
        refresh_token:
          type: string
          minLength: 20
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          minimum: 1
        refresh_expires_in:
          type: integer
          minimum: 1
        admin:
          $ref: '#/components/schemas/AdminProfile'

    TokenRefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 20

    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refresh_token:
          type:
            - string
            - 'null'
          minLength: 20

    AdminProfile:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - login
        - full_name
        - role
        - permissions
        - is_active
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        tenant_id:
          $ref: '#/components/schemas/UUID'
        login:
          type: string
          maxLength: 120
        full_name:
          type: string
          maxLength: 160
        email:
          type:
            - string
            - 'null'
          format: email
        role:
          $ref: '#/components/schemas/StaffRole'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/AdminPermission'
        is_active:
          type: boolean
        last_login_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          $ref: '#/components/schemas/DateTime'

    DashboardSummary:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - interval
        - bookings
        - revenue
        - customers
        - staff
      properties:
        tenant_id:
          $ref: '#/components/schemas/UUID'
        interval:
          type: object
          additionalProperties: false
          required: [from, to]
          properties:
            from:
              $ref: '#/components/schemas/DateTime'
            to:
              $ref: '#/components/schemas/DateTime'
        bookings:
          type: object
          additionalProperties: false
          required: [total, confirmed, completed, canceled, no_show]
          properties:
            total:
              type: integer
              minimum: 0
            confirmed:
              type: integer
              minimum: 0
            completed:
              type: integer
              minimum: 0
            canceled:
              type: integer
              minimum: 0
            no_show:
              type: integer
              minimum: 0
        revenue:
          type: object
          additionalProperties: false
          required: [gross, average_ticket]
          properties:
            gross:
              $ref: '#/components/schemas/Money'
            average_ticket:
              $ref: '#/components/schemas/Money'
        customers:
          type: object
          additionalProperties: false
          required: [total, new, returning]
          properties:
            total:
              type: integer
              minimum: 0
            new:
              type: integer
              minimum: 0
            returning:
              type: integer
              minimum: 0
        staff:
          type: object
          additionalProperties: false
          required: [active, utilization_percent]
          properties:
            active:
              type: integer
              minimum: 0
            utilization_percent:
              type: number
              minimum: 0
              maximum: 100

    CustomerBase:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - full_name
        - phone
        - is_active
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        tenant_id:
          $ref: '#/components/schemas/UUID'
        full_name:
          type: string
          maxLength: 160
        phone:
          $ref: '#/components/schemas/PhoneNumber'
        email:
          type:
            - string
            - 'null'
          format: email
        birth_date:
          type:
            - string
            - 'null'
          format: date
        notes:
          type:
            - string
            - 'null'
          maxLength: 4000
        loyalty_tier:
          $ref: '#/components/schemas/LoyaltyTier'
        is_active:
          type: boolean
        last_visit_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          type:
            - string
            - 'null'
          format: date-time

    CustomerDetail:
      allOf:
        - $ref: '#/components/schemas/CustomerBase'
        - type: object
          additionalProperties: false
          properties:
            loyalty_account:
              oneOf:
                - $ref: '#/components/schemas/LoyaltyAccountDetail'
                - type: 'null'
            metrics:
              type: object
              additionalProperties: false
              properties:
                total_bookings:
                  type: integer
                  minimum: 0
                completed_bookings:
                  type: integer
                  minimum: 0
                canceled_bookings:
                  type: integer
                  minimum: 0
                no_show_bookings:
                  type: integer
                  minimum: 0
                lifetime_gross:
                  $ref: '#/components/schemas/Money'

    CustomerListResponse:
      type: object
      additionalProperties: false
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerBase'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CustomerUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 160
        phone:
          $ref: '#/components/schemas/PhoneNumber'
        email:
          oneOf:
            - type: string
              format: email
            - type: 'null'
        birth_date:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        notes:
          oneOf:
            - type: string
              maxLength: 4000
            - type: 'null'

    CustomerStatusUpdateRequest:
      type: object
      additionalProperties: false
      required: [is_active]
      properties:
        is_active:
          type: boolean
        reason:
          type:
            - string
            - 'null'
          maxLength: 500

    StaffBase:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - full_name
        - role
        - is_active
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        tenant_id:
          $ref: '#/components/schemas/UUID'
        full_name:
          type: string
          maxLength: 160
        phone:
          oneOf:
            - $ref: '#/components/schemas/PhoneNumber'
            - type: 'null'
        email:
          type:
            - string
            - 'null'
          format: email
        role:
          $ref: '#/components/schemas/StaffRole'
        bio:
          type:
            - string
            - 'null'
          maxLength: 4000
        color_hex:
          type:
            - string
            - 'null'
          pattern: '^#[A-Fa-f0-9]{6}$'
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          type:
            - string
            - 'null'
          format: date-time

    StaffDetail:
      allOf:
        - $ref: '#/components/schemas/StaffBase'
        - type: object
          additionalProperties: false
          properties:
            schedule:
              oneOf:
                - $ref: '#/components/schemas/StaffSchedule'
                - type: 'null'
            service_ids:
              type: array
              items:
                $ref: '#/components/schemas/UUID'

    StaffListResponse:
      type: object
      additionalProperties: false
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StaffBase'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    StaffCreateRequest:
      type: object
      additionalProperties: false
      required: [full_name, role]
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 160
        phone:
          oneOf:
            - $ref: '#/components/schemas/PhoneNumber'
            - type: 'null'
        email:
          oneOf:
            - type: string
              format: email
            - type: 'null'
        role:
          $ref: '#/components/schemas/StaffRole'
        bio:
          oneOf:
            - type: string
              maxLength: 4000
            - type: 'null'
        color_hex:
          oneOf:
            - type: string
              pattern: '^#[A-Fa-f0-9]{6}$'
            - type: 'null'
        service_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/UUID'

    StaffUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 160
        phone:
          oneOf:
            - $ref: '#/components/schemas/PhoneNumber'
            - type: 'null'
        email:
          oneOf:
            - type: string
              format: email
            - type: 'null'
        role:
          $ref: '#/components/schemas/StaffRole'
        bio:
          oneOf:
            - type: string
              maxLength: 4000
            - type: 'null'
        color_hex:
          oneOf:
            - type: string
              pattern: '^#[A-Fa-f0-9]{6}$'
            - type: 'null'
        is_active:
          type: boolean
        service_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/UUID'

    DayOfWeek:
      type: string
      enum:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday

    StaffScheduleSlot:
      type: object
      additionalProperties: false
      required: [day, start_time, end_time]
      properties:
        day:
          $ref: '#/components/schemas/DayOfWeek'
        start_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        end_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        break_start_time:
          oneOf:
            - type: string
              pattern: '^([01]\d|2[0-3]):[0-5]\d$'
            - type: 'null'
        break_end_time:
          oneOf:
            - type: string
              pattern: '^([01]\d|2[0-3]):[0-5]\d$'
            - type: 'null'

    StaffSchedule:
      type: object
      additionalProperties: false
      required: [staff_id, timezone, slots]
      properties:
        staff_id:
          $ref: '#/components/schemas/UUID'
        timezone:
          type: string
          maxLength: 64
          examples: [Europe/Riga]
        slots:
          type: array
          items:
            $ref: '#/components/schemas/StaffScheduleSlot'

    StaffScheduleReplaceRequest:
      type: object
      additionalProperties: false
      required: [timezone, slots]
      properties:
        timezone:
          type: string
          maxLength: 64
        slots:
          type: array
          items:
            $ref: '#/components/schemas/StaffScheduleSlot'

    AvailabilitySlot:
      type: object
      additionalProperties: false
      required: [start_at, end_at, is_available]
      properties:
        start_at:
          $ref: '#/components/schemas/DateTime'
        end_at:
          $ref: '#/components/schemas/DateTime'
        is_available:
          type: boolean
        reason:
          type:
            - string
            - 'null'
          maxLength: 160

    AvailabilityResponse:
      type: object
      additionalProperties: false
      required: [staff_id, from, to, slots]
      properties:
        staff_id:
          $ref: '#/components/schemas/UUID'
        from:
          $ref: '#/components/schemas/DateTime'
        to:
          $ref: '#/components/schemas/DateTime'
        slots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'

    ServiceBase:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - name
        - duration_minutes
        - price
        - is_active
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        tenant_id:
          $ref: '#/components/schemas/UUID'
        category:
          type:
            - string
            - 'null'
          maxLength: 64
        name:
          type: string
          maxLength: 160
        description:
          type:
            - string
            - 'null'
          maxLength: 4000
        duration_minutes:
          type: integer
          minimum: 5
          maximum: 1440
        cleanup_minutes:
          type: integer
          minimum: 0
          maximum: 240
          default: 0
        price:
          $ref: '#/components/schemas/Money'
        is_active:
          type: boolean
        created_at:
          $ref: '#/components/schemas/DateTime'
        updated_at:
          type:
            - string
            - 'null'
          format: date-time

    ServiceDetail:
      allOf:
        - $ref: '#/components/schemas/ServiceBase'
        - type: object
          additionalProperties: false
          properties:
            assigned_staff_ids:
              type: array
              items:
                $ref: '#/components/schemas/UUID'

    ServiceListResponse:
      type: object
      additionalProperties: false
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceBase'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ServiceCreateRequest:
      type: object
      additionalProperties: false
      required: [name, duration_minutes, price]
      properties:
        category:
          oneOf:
            - type: string
              maxLength: 64
            - type: 'null'
        name:
          type: string
          minLength: 1
          maxLength: 160
        description:
          oneOf:
            - type: string
              maxLength: 4000
            - type: 'null'
        duration_minutes:
          type: integer
          minimum: 5
          maximum: 1440
        cleanup_minutes:
          type: integer
          minimum: 0
          maximum: 240
          default: 0
        price:
          $ref: '#/components/schemas/Money'
        is_active:
          type: boolean
          default: true
        assigned_staff_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/UUID'

    ServiceUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        category:
          oneOf:
            - type: string
              maxLength: 64
            - type: 'null'
        name:
          type: string
          minLength: 1
          maxLength: 160
        description:
          oneOf:
            - type: string
              maxLength: 4000
            - type: 'null'
        duration_minutes:
          type: integer
          minimum: 5
          maximum: 1440
