apiVersion: v1
kind: Namespace
metadata:
  name: reva-studio
  labels:
    app.kubernetes.io/name: reva-studio
    app.kubernetes.io/instance: reva-studio
    app.kubernetes.io/part-of: reva-studio
    app.kubernetes.io/component: platform
    app.kubernetes.io/managed-by: kubectl

    # Pod Security Admission
    # For a reusable base manifest, `latest` avoids hard-binding to a specific
    # Kubernetes minor version when the target cluster version is not yet fixed.
    # In strict enterprise environments, this is often pinned in overlays.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
  annotations:
    reva-studio.io/description: "Base namespace for the Reva Studio platform."
    reva-studio.io/owner: "platform-team"
    reva-studio.io/environment-scope: "base"