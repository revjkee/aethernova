# reva-studio/ruff.toml
# Industrial Ruff configuration for a production Python backend/service project.
# Verified against official Ruff documentation:
# https://docs.astral.sh/ruff/configuration/
# https://docs.astral.sh/ruff/settings/
# https://docs.astral.sh/ruff/rules/

# ----------------------------------------------------------------------
# Core
# ----------------------------------------------------------------------

# Pin Ruff behavior across local/dev/CI environments.
required-version = ">=0.11.0"

# Cannot verify your exact runtime version from the provided data.
# py311 is used here as a safe production baseline.
target-version = "py311"

# Keep formatter and linter aligned.
line-length = 100
indent-width = 4

# Prevent accidentally linting or formatting generated, vendor, cache,
# packaging, and infrastructure artifacts.
extend-exclude = [
  ".git",
  ".github",
  ".hg",
  ".idea",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".tox",
  ".venv",
  ".vscode",
  "__pycache__",
  "__pypackages__",
  "_build",
  "build",
  "dist",
  "htmlcov",
  "site",
  "node_modules",
  "coverage",
  "docs/_build",
  "alembic/versions",
  "migrations/versions",
  "staticfiles",
  "frontend",
  "infra/.terraform",
]

# Respect repository ignore files and make exclusions strict even if a file
# is passed directly on the CLI.
respect-gitignore = true
force-exclude = true

# Treat these directories as import roots for first-party resolution.
src = [
  "src",
  "app",
  ".",
]

# Optional precise overrides for scripts if they intentionally use newer syntax.
[per-file-target-version]
"scripts/*.py" = "py311"
"tools/*.py" = "py311"

# ----------------------------------------------------------------------
# Lint
# ----------------------------------------------------------------------

[lint]
# Strong production-grade baseline:
# E/F/W     pycodestyle/pyflakes warnings and errors
# I         import ordering
# N         pep8-naming
# UP        pyupgrade
# B         flake8-bugbear
# C4        flake8-comprehensions
# SIM       flake8-simplify
# TID       flake8-tidy-imports
# Q         flake8-quotes
# RSE       flake8-raise
# RET       flake8-return
# PTH       flake8-use-pathlib
# LOG       flake8-logging
# G         flake8-logging-format
# TRY       tryceratops
# RUF       Ruff-specific checks
# PL        pylint subset
# PERF      Perflint
# FURB      refurb
# ARG       unused arguments
# ICN       import conventions
# PIE       flake8-pie
# T20       print/pprint detection
# DTZ       naive datetime safety
# A         builtin shadowing
# BLE       blind-except
# S         bandit-inspired security checks
# D         docstring quality
select = [
  "E",
  "F",
  "W",
  "I",
  "N",
  "UP",
  "B",
  "C4",
  "SIM",
  "TID",
  "Q",
  "RSE",
  "RET",
  "PTH",
  "LOG",
  "G",
  "TRY",
  "RUF",
  "PL",
  "PERF",
  "FURB",
  "ARG",
  "ICN",
  "PIE",
  "T20",
  "DTZ",
  "A",
  "BLE",
  "S",
  "D",
]

# Intentionally ignored rules that often create noise or overlap
# with pragmatic service/backend development patterns.
ignore = [
  "D100",   # Missing docstring in public module
  "D104",   # Missing docstring in public package
  "D105",   # Missing docstring in magic method
  "D107",   # Missing docstring in __init__
  "COM812", # Trailing comma conflicts if formatter handles layout
  "ISC001", # Implicit str concat conflicts with formatter handling
  "TRY003", # Long exception messages can be acceptable in service code
  "EM101",  # Exception message string in raise
  "EM102",  # f-string in exception
  "G004",   # Logging f-string; many teams allow it pragmatically
  "S101",   # assert usage; often valid in tests
  "PLR0913",# Too many args; tuned separately below
  "PLR2004",# Magic values; tuned separately below
]

# Allow all safe auto-fixes by default.
fixable = ["ALL"]

# Require explicit unsafe-fixes flag for higher-risk transformations.
extend-unsafe-fixes = [
  "F401",   # unused imports
  "F841",   # unused variables
  "B",      # bugbear fixes can alter behavior
  "UP",     # pyupgrade can be semantic in edge cases
]

# Stronger protection against hidden garbage identifiers.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Unicode confusables are not allowed unless explicitly whitelisted.
allowed-confusables = []

# File-specific policy.
[lint.per-file-ignores]
# Re-export patterns are common in package init files.
"__init__.py" = [
  "F401",
]

# CLI/bootstrap scripts may legitimately print and have imports placed late.
"scripts/*.py" = [
  "T20",
  "E402",
]

"tools/*.py" = [
  "T20",
  "E402",
]

# Alembic migrations are intentionally imperative and import-heavy.
"alembic/env.py" = [
  "E402",
]
"alembic/versions/*.py" = [
  "D",
  "E501",
  "N806",
  "RUF012",
]
"migrations/versions/*.py" = [
  "D",
  "E501",
  "N806",
  "RUF012",
]

# Tests can be more flexible.
"tests/*.py" = [
  "S101",
  "PLR2004",
  "ARG001",
  "ARG002",
  "D",
]
"tests/**/*.py" = [
  "S101",
  "PLR2004",
  "ARG001",
  "ARG002",
  "D",
]

# ----------------------------------------------------------------------
# Formatter
# ----------------------------------------------------------------------

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = "dynamic"
skip-magic-trailing-comma = false

# ----------------------------------------------------------------------
# Import sorting
# ----------------------------------------------------------------------

[lint.isort]
combine-as-imports = true
force-single-line = false
split-on-trailing-comma = true
order-by-type = true
known-first-party = [
  "reva_studio",
  "src",
  "app",
  "tests",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]

# ----------------------------------------------------------------------
# Docstrings
# ----------------------------------------------------------------------

[lint.pydocstyle]
convention = "google"

# ----------------------------------------------------------------------
# Import discipline
# ----------------------------------------------------------------------

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

# ----------------------------------------------------------------------
# Quotes
# ----------------------------------------------------------------------

[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"
avoid-escape = true

# ----------------------------------------------------------------------
# Naming/import aliases
# ----------------------------------------------------------------------

[lint.flake8-import-conventions.aliases]
numpy = "np"
pandas = "pd"
matplotlib.pyplot = "plt"
sqlalchemy = "sa"

# ----------------------------------------------------------------------
# Complexity / maintainability thresholds
# ----------------------------------------------------------------------

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 7
max-positional-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
allow-magic-value-types = ["str", "bytes", "int"]

# ----------------------------------------------------------------------
# Pytest style
# ----------------------------------------------------------------------

[lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false