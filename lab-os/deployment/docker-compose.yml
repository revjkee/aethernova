version: '3.8'
services:
  labos-api:
    build: ../
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgresql://labos:password@db:5432/labos
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=labos
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
