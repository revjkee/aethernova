[pytest]
minversion = 7.0

testpaths =
    tests

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*

python_functions =
    test_*

addopts =
    -ra
    --strict-markers
    --strict-config
    --disable-warnings
    --maxfail=1
    --showlocals

norecursedirs =
    .git
    .github
    .idea
    .vscode
    __pycache__
    build
    dist
    .venv
    venv
    env
    node_modules
    docs
    legacy
    reports

markers =
    unit: fast isolated tests
    integration: tests involving multiple components
    contract: contract tests validating schemas and expected artifacts
    security: security-focused tests (must be deterministic and safe)
    compliance: tests verifying policy and governance rules
    slow: long-running tests (not executed by default)
    network: tests requiring network access (not executed by default)
    e2e: end-to-end tests (not executed by default)

filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning

xfail_strict = true

junit_family = xunit2

log_cli = false
log_level = INFO
log_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S%z
