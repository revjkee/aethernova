# human-sovereignty-core/config/trust_anchors.yaml
#
# Purpose:
#   Defines cryptographic and physical trust anchors that are authorized
#   to assert human sovereignty, approve RED-domain decisions, and sign
#   critical actions within the system.
#
# Design principles:
# - Explicit trust only (no implicit inheritance)
# - Human-owned keys by default
# - Revocation is first-class
# - Machine-verifiable structure
#
# This file is policy-as-code, not a factual claim.

version: "1.0.0"
schema: "human-sovereignty.trust_anchors.v1"
last_updated_utc: "2026-01-27T00:00:00Z"

defaults:
  crypto:
    allowed_algorithms:
      - ed25519
      - rsa-4096
      - ecdsa-p256
    forbidden_algorithms:
      - rsa-1024
      - rsa-2048
      - md5
      - sha1
  enforcement:
    unknown_anchor_action: deny
    expired_anchor_action: deny
    revoked_anchor_action: deny
  audit:
    log_all_verifications: true
    retain_days: 3650

anchors:
  - id: TA-HUMAN-ROOT-001
    type: human_root
    status: active
    owner:
      entity: human
      role: project_owner
      sovereignty: full
    description: >
      Primary human sovereignty root.
      Final authority for RED-domain decisions and strategic approvals.
    crypto:
      algorithm: ed25519
      public_key: |
        -----BEGIN PUBLIC KEY-----
        REPLACE_WITH_REAL_PUBLIC_KEY
        -----END PUBLIC KEY-----
      fingerprint:
        sha256: "REPLACE_WITH_REAL_SHA256_FINGERPRINT"
    scope:
      domains:
        - strategy
        - finance
        - legal
        - security
        - production
      permissions:
        - approve_red_decision
        - sign_release
        - rotate_trust_anchors
        - revoke_anchors
    validity:
      not_before_utc: "2025-01-01T00:00:00Z"
      not_after_utc: "2035-01-01T00:00:00Z"
    revocation:
      revoked: false
      revoked_utc: null
      reason: null
    provenance:
      generated_by: offline_hardware
      generation_note: "Key generated on air-gapped device"
    audit:
      require_multi_factor: true
      allowed_confirmation_methods:
        - hardware_key
        - biometric
        - passphrase

  - id: TA-HW-DEVICE-001
    type: hardware_device
    status: active
    owner:
      entity: human
      role: project_owner
    description: >
      Trusted hardware device used for signing and approval.
    device:
      class: hardware_security_key
      vendor: yubico
      model: yubikey_5_series
      serial: "REPLACE_WITH_DEVICE_SERIAL"
    crypto:
      algorithm: ed25519
      public_key: |
        -----BEGIN PUBLIC KEY-----
        REPLACE_WITH_REAL_DEVICE_PUBLIC_KEY
        -----END PUBLIC KEY-----
      fingerprint:
        sha256: "REPLACE_WITH_REAL_SHA256_FINGERPRINT"
    scope:
      domains:
        - security
        - production
      permissions:
        - approve_red_decision
        - sign_runtime_action
    validity:
      not_before_utc: "2025-01-01T00:00:00Z"
      not_after_utc: "2030-01-01T00:00:00Z"
    revocation:
      revoked: false
      revoked_utc: null
      reason: null
    audit:
      require_physical_presence: true

  - id: TA-CI-LIMITED-001
    type: system_limited
    status: active
    owner:
      entity: system
      role: ci_pipeline
    description: >
      Limited trust anchor for CI verification only.
      Explicitly forbidden from RED-domain approvals.
    crypto:
      algorithm: ed25519
      public_key: |
        -----BEGIN PUBLIC KEY-----
        REPLACE_WITH_REAL_CI_PUBLIC_KEY
        -----END PUBLIC KEY-----
      fingerprint:
        sha256: "REPLACE_WITH_REAL_SHA256_FINGERPRINT"
    scope:
      domains:
        - build
        - test
        - verification
      permissions:
        - verify_integrity
        - attest_build
      forbidden_permissions:
        - approve_red_decision
        - sign_release
        - rotate_trust_anchors
    validity:
      not_before_utc: "2025-01-01T00:00:00Z"
      not_after_utc: "2027-01-01T00:00:00Z"
    revocation:
      revoked: false
      revoked_utc: null
      reason: null

revocation_registry:
  enabled: true
  mechanism:
    type: local_authoritative
    update_policy: immediate
  record_fields:
    - anchor_id
    - revoked_utc
    - reason
    - revoked_by

verification_rules:
  - id: VR-RED-001
    description: RED-domain actions require active human_root anchor
    require:
      anchor_type: human_root
      status: active
      scope_permission: approve_red_decision

  - id: VR-CRYPTO-001
    description: Enforce minimum cryptographic strength
    require:
      algorithm_in_allowed_list: true

  - id: VR-TIME-001
    description: Anchor must be within validity window
    require:
      within_validity_period: true
