# human-sovereignty-core/config/ttl_policy.yaml
# Purpose: Centralized TTL and retention policy for data artifacts.
# Format: YAML with explicit versioning and reusable profiles.

version: 1
policy_id: human-sovereignty-ttl
updated_at_utc: "2026-01-27T00:00:00Z"

units:
  duration: seconds

defaults:
  timezone: UTC
  now_source: utc
  clamp:
    enabled: true
    min_seconds: 1
    max_seconds: 31536000
  grace_period_seconds: 30
  jitter:
    enabled: true
    mode: uniform
    percent: 0.05
    min_seconds: 0
  on_missing_rule:
    action: deny
    reason: "No TTL rule defined for entity"
  on_invalid_value:
    action: deny
    reason: "Invalid TTL value"
  compatibility:
    accept_legacy_fields: true
    legacy_duration_fields:
      - ttl_seconds
      - ttl
      - expires_in
    legacy_unit_default: seconds

profiles:
  instant:
    base_seconds: 15
    grace_period_seconds: 5
    jitter:
      enabled: true
      percent: 0.10

  short:
    base_seconds: 300
    grace_period_seconds: 30
    jitter:
      enabled: true
      percent: 0.07

  medium:
    base_seconds: 3600
    grace_period_seconds: 60
    jitter:
      enabled: true
      percent: 0.05

  long:
    base_seconds: 86400
    grace_period_seconds: 300
    jitter:
      enabled: true
      percent: 0.03

  extended:
    base_seconds: 604800
    grace_period_seconds: 600
    jitter:
      enabled: true
      percent: 0.02

  archival:
    base_seconds: 2592000
    grace_period_seconds: 1800
    jitter:
      enabled: false
      percent: 0.0

rules:
  - entity: session
    description: "Interactive session state for authenticated user"
    profile: medium
    constraints:
      min_seconds: 600
      max_seconds: 43200
    revoke_on:
      - password_change
      - mfa_reset
      - privilege_change
      - explicit_logout

  - entity: session_refresh_token
    description: "Refresh token for renewing a session"
    profile: extended
    constraints:
      min_seconds: 86400
      max_seconds: 1209600
    revoke_on:
      - password_change
      - mfa_reset
      - privilege_change
      - explicit_logout

  - entity: access_token
    description: "Short-lived access token"
    profile: short
    constraints:
      min_seconds: 60
      max_seconds: 1800
    revoke_on:
      - explicit_logout
      - privilege_change

  - entity: nonce
    description: "One-time nonce for replay protection"
    profile: instant
    constraints:
      min_seconds: 5
      max_seconds: 120

  - entity: verification_code
    description: "Email or SMS verification code"
    profile: short
    constraints:
      min_seconds: 60
      max_seconds: 900

  - entity: rate_limit_bucket
    description: "Rate limiting counters in cache"
    profile: short
    constraints:
      min_seconds: 10
      max_seconds: 3600

  - entity: consent_record
    description: "User consent records (retention window, not auth TTL)"
    profile: archival
    constraints:
      min_seconds: 86400
      max_seconds: 31536000

  - entity: audit_event
    description: "Security and governance audit events retention window"
    profile: extended
    constraints:
      min_seconds: 86400
      max_seconds: 31536000
    immutable: true
    rotate:
      enabled: true
      chunk_seconds: 86400

  - entity: decision_packet
    description: "Decision packet lifecycle storage window"
    profile: extended
    constraints:
      min_seconds: 3600
      max_seconds: 31536000
    state_overrides:
      DRAFT:
        profile: medium
        constraints:
          min_seconds: 900
          max_seconds: 86400
      APPROVED:
        profile: extended
        constraints:
          min_seconds: 3600
          max_seconds: 2592000
      EXECUTED:
        profile: archival
        constraints:
          min_seconds: 86400
          max_seconds: 31536000

  - entity: temp_artifact
    description: "Temporary artifacts created during processing"
    profile: short
    constraints:
      min_seconds: 30
      max_seconds: 7200
    purge_strategy:
      mode: eager
      batch_size: 500

  - entity: cache_entry
    description: "Generic cache entry fallback"
    profile: medium
    constraints:
      min_seconds: 10
      max_seconds: 604800

enforcement:
  compute_ttl:
    formula: "ttl = clamp(base_seconds * (1 +/- jitter.percent), min, max)"
  grace_behavior:
    allow_reads_after_expiry_seconds: 0
    allow_writes_after_expiry_seconds: 0
  purge:
    scheduler:
      enabled: true
      interval_seconds: 60
      max_work_seconds: 20
    safeguards:
      max_deletions_per_run: 5000
      backoff_on_errors_seconds: 30

integrations:
  storage:
    redis:
      default_key_prefix: "hsc:"
      expire_command: EXPIRE
    postgres:
      use_expires_at_column: true
      expires_at_column_name: "expires_at"
      cleanup_job:
        enabled: true
        interval_seconds: 300
  logging:
    emit_policy_decisions: true
    emit_rejections: true
