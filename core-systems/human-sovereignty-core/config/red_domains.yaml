version: "1.0.0"

metadata:
  owner_team: "human-sovereignty-core"
  maintained_by: "platform-security-core"
  last_reviewed: "2026-01-27"
  purpose: "Policy list of RED domains and related network identifiers for blocking, escalation, or quarantine."
  change_control:
    required_approvers:
      - "security-lead"
      - "sre-lead"
    rollout:
      strategy: "progressive"
      canary_percent: 10
      rollback_on:
        - "false_positive_spike"
        - "production_outage"
        - "policy_misroute"
  audit:
    enabled: true
    sink: "observability-core"
    redact_fields:
      - "user_identifier"
      - "session_token"
      - "authorization"
      - "cookie"
      - "ip"
    include_policy_hash: true
  notes:
    - "This file intentionally does not include real domain lists unless backed by confirmed, reviewable sources."
    - "Populate references and rules through a controlled pipeline (PR + approvals + CI validation)."

defaults:
  timezone: "Europe/Stockholm"
  locale: "ru-RU"

  enforcement:
    mode: "enforce"
    supported_modes:
      - "disabled"
      - "monitor"
      - "enforce"
    fail_closed: true
    decision_cache_seconds: 300
    correlation:
      dedupe_window_seconds: 900
      fingerprint_fields:
        - "rule_id"
        - "match_type"
        - "value"
        - "direction"
        - "protocol"
        - "service"
        - "environment"

  actions:
    block:
      response:
        http_status: 451
        message: "Blocked by Human Sovereignty Policy"
      dns:
        strategy: "nxdomain"
      network:
        strategy: "drop"
    quarantine:
      route_to: "egress://quarantine-proxy"
      max_duration_seconds: 3600
    escalate:
      targets:
        - "oncall://platform-security-core"
      channels:
        - "pager"
        - "slack"
        - "email"
      throttle:
        max_per_incident: 10
        max_per_hour: 30

  precedence:
    order:
      - "exceptions"
      - "rules"

  matching:
    domain_normalization:
      lower: true
      strip_trailing_dot: true
      punycode: true
    http_host_sources:
      - "tls_sni"
      - "http_host_header"
      - "dns_qname"
    regex:
      max_length: 256
      engine: "re2"
      deny_lookarounds: true

references:
  # Заполняется только ссылками на реальные документы/тикеты/отчёты, чтобы каждый элемент был перепроверяемым.
  # Если ссылки не указаны, обоснование считается неподтверждённым.
  - id: "REF-PLACEHOLDER-000"
    type: "ticket"
    title: "Placeholder reference for RED domain onboarding"
    locator: "internal://tickets/PLACEHOLDER"
    owner: "platform-security-core"
    last_verified: "2026-01-27"
    integrity:
      sha256: ""
    status: "placeholder"

scopes:
  # Где применять правила
  - id: "SCOPE-EGRESS-DEFAULT"
    direction: "egress"
    protocols:
      - "dns"
      - "http"
      - "https"
      - "tls"
    environments:
      - "prod"
      - "staging"
    services:
      - "*"

  - id: "SCOPE-INGRESS-DEFAULT"
    direction: "ingress"
    protocols:
      - "http"
      - "https"
      - "tls"
    environments:
      - "prod"
    services:
      - "*"

exceptions:
  # Исключения имеют приоритет и предназначены для безопасного точечного обхода блокировок.
  # Каждое исключение должно иметь ссылку на подтверждённый источник.
  - id: "EXC-PLACEHOLDER-001"
    enabled: false
    priority: 1
    scope_ref: "SCOPE-EGRESS-DEFAULT"
    match:
      type: "domain"
      value: "example.com"
      include_subdomains: true
    allow:
      reason: "Temporary allow for controlled testing."
      expires_at: "2026-02-03T00:00:00+01:00"
      reference_ids:
        - "REF-PLACEHOLDER-000"

rules:
  # Правила RED: блок/карантин/эскалация.
  # Реальные значения добавляются только при наличии reference_ids на проверяемые источники.
  - id: "RED-DOMAIN-PLACEHOLDER-001"
    enabled: false
    priority: 100
    severity: "high"
    scope_refs:
      - "SCOPE-EGRESS-DEFAULT"
    match:
      type: "domain"
      value: "replace-with-confirmed-domain.tld"
      include_subdomains: true
    action:
      type: "block"
      notify_on_hit: true
    justification:
      summary: "Unconfirmed placeholder. Do not enable without verified reference."
      reference_ids:
        - "REF-PLACEHOLDER-000"
    telemetry:
      tags:
        - "red_domain"
        - "human_sovereignty"
      log_fields:
        - "rule_id"
        - "match_type"
        - "value"
        - "direction"
        - "protocol"
        - "service"
        - "environment"
        - "decision"

  - id: "RED-SUFFIX-PLACEHOLDER-002"
    enabled: false
    priority: 110
    severity: "medium"
    scope_refs:
      - "SCOPE-EGRESS-DEFAULT"
    match:
      type: "suffix"
      value: ".replace-with-confirmed-suffix"
    action:
      type: "quarantine"
      notify_on_hit: true
    justification:
      summary: "Unconfirmed placeholder. Do not enable without verified reference."
      reference_ids:
        - "REF-PLACEHOLDER-000"
    telemetry:
      tags:
        - "red_domain"
        - "suffix"

  - id: "RED-REGEX-PLACEHOLDER-003"
    enabled: false
    priority: 120
    severity: "critical"
    scope_refs:
      - "SCOPE-EGRESS-DEFAULT"
    match:
      type: "regex"
      value: "^(?:.*\\.)?replace-with-confirmed-pattern\\.tld$"
    action:
      type: "block"
      notify_on_hit: true
    justification:
      summary: "Unconfirmed placeholder. Do not enable without verified reference."
      reference_ids:
        - "REF-PLACEHOLDER-000"
    telemetry:
      tags:
        - "red_domain"
        - "regex"

  - id: "RED-ASN-PLACEHOLDER-004"
    enabled: false
    priority: 130
    severity: "high"
    scope_refs:
      - "SCOPE-EGRESS-DEFAULT"
    match:
      type: "asn"
      value: 0
    action:
      type: "escalate"
      notify_on_hit: true
    justification:
      summary: "Unconfirmed placeholder. Do not enable without verified reference."
      reference_ids:
        - "REF-PLACEHOLDER-000"
    telemetry:
      tags:
        - "red_network"
        - "asn"

  - id: "RED-CIDR-PLACEHOLDER-005"
    enabled: false
    priority: 140
    severity: "high"
    scope_refs:
      - "SCOPE-EGRESS-DEFAULT"
    match:
      type: "cidr"
      value: "0.0.0.0/32"
    action:
      type: "block"
      notify_on_hit: true
    justification:
      summary: "Unconfirmed placeholder. Do not enable without verified reference."
      reference_ids:
        - "REF-PLACEHOLDER-000"
    telemetry:
      tags:
        - "red_network"
        - "cidr"

validation:
  strict: true
  unknown_fields: "deny"
  required_top_level:
    - "version"
    - "metadata"
    - "defaults"
    - "references"
    - "scopes"
    - "exceptions"
    - "rules"
    - "validation"
  constraints:
    ids:
      pattern: "^[A-Z0-9\\-]{6,64}$"
    rule_priorities:
      min: 1
      max: 100000
    domain_value:
      max_length: 253
    suffix_value:
      must_start_with_dot: true
    cidr:
      allow_ipv4: true
      allow_ipv6: true
    timestamps:
      require_timezone: true
