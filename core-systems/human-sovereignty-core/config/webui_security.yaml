# human-sovereignty-core/config/webui_security.yaml
#
# WebUI security baseline for Human Sovereignty Core.
# Default posture: deny-by-default, local-only, hardened headers.
#
# IMPORTANT:
# - If you expose WebUI beyond localhost, you MUST revise allowed_origins,
#   cookie domain, TLS settings, and consider mTLS.
# - This file is policy/config only; enforcement happens in WebUI gateway.

meta:
  schema: "hsc.webui_security.v1"
  owner: "human-sovereignty-core"
  updated_utc: "2026-01-27T00:00:00Z"
  notes:
    - "Default: local-only, deny-by-default."
    - "CSP is strict; add only required sources."

network:
  # Primary control: origin allowlist for browser clients.
  # Use explicit origins only, never "*".
  allowed_origins:
    - "http://127.0.0.1:3000"
    - "http://localhost:3000"
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
  # Optional: for reverse-proxy deployments. Keep empty unless you know why.
  trusted_proxies:
    # - "127.0.0.1/32"
    # - "::1/128"
    - "127.0.0.1/32"
    - "::1/128"
  # If true, reject requests with missing/invalid Host header.
  enforce_host_header: true
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
  # If true, require HTTPS scheme for sensitive endpoints (auth/session).
  require_https_for_auth: true

cors:
  enabled: true
  allow_credentials: true
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allow_headers:
    - "Accept"
    - "Accept-Language"
    - "Content-Type"
    - "Authorization"
    - "X-Request-Id"
    - "X-CSRF-Token"
    - "X-Forwarded-For"
    - "X-Forwarded-Proto"
  expose_headers:
    - "X-Request-Id"
    - "X-RateLimit-Limit"
    - "X-RateLimit-Remaining"
    - "X-RateLimit-Reset"
  max_age_seconds: 600

csrf:
  enabled: true
  # Double-submit cookie pattern is recommended for SPAs behind API gateway.
  mode: "double_submit_cookie"   # double_submit_cookie|synchronizer_token
  cookie_name: "__Host-hsc_csrf"
  header_name: "X-CSRF-Token"
  rotate_per_request: false
  safe_methods: ["GET", "HEAD", "OPTIONS"]
  # Enforce Origin/Referer checks for state-changing requests.
  enforce_origin_check: true
  enforce_referer_check: true

cookies:
  session_cookie:
    name: "__Host-hsc_session"
    http_only: true
    secure: true
    same_site: "Strict"          # Strict|Lax|None
    path: "/"
    # Domain must be omitted when using __Host- prefix.
    domain: null
    max_age_seconds: 3600
    rolling: true
  refresh_cookie:
    name: "__Host-hsc_refresh"
    http_only: true
    secure: true
    same_site: "Strict"
    path: "/auth/refresh"
    domain: null
    max_age_seconds: 1209600     # 14 days
    rolling: false

content_limits:
  max_request_body_bytes: 1048576      # 1 MiB
  max_json_bytes: 1048576              # 1 MiB
  max_form_bytes: 262144               # 256 KiB
  max_file_upload_bytes: 5242880       # 5 MiB
  allowed_upload_content_types:
    - "application/json"
    - "text/plain"
  disallow_svg_uploads: true

security_headers:
  enabled: true
  # Prevent MIME sniffing.
  x_content_type_options: "nosniff"
  # Prevent clickjacking.
  x_frame_options: "DENY"
  # Referrer policy
  referrer_policy: "no-referrer"
  # Enable cross-origin isolation where possible.
  cross_origin_opener_policy: "same-origin"
  cross_origin_resource_policy: "same-origin"
  cross_origin_embedder_policy: "require-corp"
  # Permissions policy: deny powerful features by default.
  permissions_policy:
    camera: "()"
    microphone: "()"
    geolocation: "()"
    payment: "()"
    usb: "()"
    bluetooth: "()"
    serial: "()"
    accelerometer: "()"
    gyroscope: "()"
    magnetometer: "()"
    fullscreen: "(self)"
    clipboard_read: "()"
    clipboard_write: "(self)"
  # HSTS
  strict_transport_security:
    enabled: true
    max_age_seconds: 31536000
    include_subdomains: true
    preload: false
  # Enable to opt-out of caching for sensitive responses.
  cache_control:
    enabled: true
    value: "no-store"

csp:
  enabled: true
  # If your UI uses inline scripts/styles, prefer nonces over 'unsafe-inline'.
  use_nonces: true
  report_only: false
  report_to: null
  report_uri: null
  directives:
    default_src: ["'none'"]
    base_uri: ["'none'"]
    object_src: ["'none'"]
    frame_ancestors: ["'none'"]
    form_action: ["'self'"]
    connect_src:
      - "'self'"
      - "http://127.0.0.1:3000"
      - "http://localhost:3000"
      - "http://127.0.0.1:5173"
      - "http://localhost:5173"
    img_src: ["'self'", "data:"]
    style_src: ["'self'"]
    script_src: ["'self'"]
    font_src: ["'self'"]
    manifest_src: ["'self'"]
    worker_src: ["'self'"]
    frame_src: ["'none'"]
    upgrade_insecure_requests: true
    block_all_mixed_content: true

rate_limit:
  enabled: true
  strategy: "token_bucket"   # token_bucket|fixed_window|sliding_window
  # Default limits are conservative for admin-style UIs.
  global:
    requests_per_minute: 600
    burst: 120
  per_ip:
    requests_per_minute: 240
    burst: 60
  per_identity:
    requests_per_minute: 300
    burst: 60
  # Sensitive endpoints get tighter limits.
  routes:
    - path_prefix: "/auth/"
      requests_per_minute: 60
      burst: 20
    - path_prefix: "/admin/"
      requests_per_minute: 120
      burst: 30
    - path_prefix: "/api/"
      requests_per_minute: 300
      burst: 60
  ban:
    enabled: true
    ban_seconds: 900
    threshold_5xx_per_minute: 120
    threshold_4xx_per_minute: 300

request_hardening:
  # Reject ambiguous/unsafe request patterns.
  reject_multiple_authorization_headers: true
  reject_multiple_cookie_headers: false
  reject_suspicious_header_bytes: true
  max_header_bytes: 32768
  max_headers_count: 128
  normalize_path: true
  reject_path_traversal: true
  reject_encoded_slashes: true
  reject_null_bytes: true

tls:
  # TLS settings are advisory here; actual enforcement happens in gateway/proxy.
  enabled: true
  min_version: "TLSv1.2"
  prefer_server_ciphers: true
  # If you terminate TLS in reverse proxy, keep mtls required at the proxy layer.
  mtls:
    enabled: false
    required: false
    client_ca_bundle_path: null

logging:
  # Avoid logging sensitive values.
  redact_headers:
    - "Authorization"
    - "Cookie"
    - "Set-Cookie"
    - "X-CSRF-Token"
  redact_query_params:
    - "token"
    - "access_token"
    - "refresh_token"
    - "code"
  request_id_header: "X-Request-Id"

sessions:
  # Session management posture
  idle_timeout_seconds: 900
  absolute_timeout_seconds: 3600
  require_reauth_for_critical_actions: true
  critical_actions:
    - "policy.update"
    - "trust_anchors.update"
    - "veto.apply"
    - "approvals.override"
