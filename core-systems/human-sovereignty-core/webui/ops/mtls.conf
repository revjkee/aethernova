# human-sovereignty-core/webui/ops/mtls.conf
#
# Zero-Trust mTLS NGINX server block for WebUI.
# Browser/admin never receives JWT. Auth relies on server-side sessions.
# Client certificate is mandatory (mTLS). Requests without a valid client cert are rejected.
#
# Paths below are examples and must match your deployment filesystem layout.

server {
    listen 8443 ssl http2;
    server_name _;

    # ---- Server TLS identity ----
    ssl_certificate           /etc/human-sovereignty/tls/server.crt;
    ssl_certificate_key       /etc/human-sovereignty/tls/server.key;

    # ---- Client mTLS verification (mandatory) ----
    ssl_client_certificate    /etc/human-sovereignty/tls/clients_ca_bundle.crt;
    ssl_verify_client         on;
    ssl_verify_depth          4;

    # Optional CRL (enable if you publish CRLs)
    # ssl_crl               /etc/human-sovereignty/tls/clients_ca.crl;

    # ---- Modern TLS only ----
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # TLS 1.3 ciphers are controlled by OpenSSL; set TLS 1.2 explicitly
    ssl_ciphers               ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # ---- Session & performance ----
    ssl_session_cache         shared:SSL:50m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    # ---- OCSP stapling (enable only if your certificate chain supports it) ----
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout          5s;

    # ---- Strict transport security (enable only when you are sure about HTTPS-only) ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Hardening headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Request limits ----
    client_max_body_size       2m;
    client_body_timeout        10s;
    client_header_timeout      10s;
    keepalive_timeout          30s;
    send_timeout               10s;

    # ---- Logging (minimal identity leakage) ----
    # Avoid logging full DN by default. If you need it, log $ssl_client_s_dn with care.
    map $ssl_client_verify $mtls_ok {
        default 0;
        SUCCESS 1;
    }

    # ---- Deny non-mTLS early ----
    if ($mtls_ok = 0) { return 495; }

    # ---- Upstream to WebUI application server ----
    # The upstream must be private (loopback or internal network).
    location / {
        proxy_http_version 1.1;

        proxy_set_header Host                 $host;
        proxy_set_header X-Forwarded-Proto    https;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP            $remote_addr;

        # Pass only minimal mTLS facts to the app (do not pass full cert by default)
        proxy_set_header X-MTLS-Verified      $ssl_client_verify;
        proxy_set_header X-MTLS-Serial        $ssl_client_serial;
        proxy_set_header X-MTLS-Issuer        $ssl_client_i_dn;

        # Optional: subject DN can be sensitive; enable only if required by your RBAC mapping
        # proxy_set_header X-MTLS-Subject    $ssl_client_s_dn;

        # Optional: fingerprint (stable identifier, still sensitive)
        # proxy_set_header X-MTLS-Fingerprint $ssl_client_fingerprint;

        proxy_connect_timeout  3s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        proxy_buffering        on;
        proxy_buffers          16 16k;
        proxy_busy_buffers_size 32k;

        proxy_pass http://127.0.0.1:8000;
    }

    # ---- Health endpoints (still require mTLS in zero-trust mode) ----
    location = /health {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8000/health;
    }
    location = /healthz {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8000/healthz;
    }
    location = /livez {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8000/livez;
    }
    location = /readyz {
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8000/readyz;
    }

    # ---- Default deny anything unexpected ----
    location ~* \.(?:bak|old|tmp|swp|sql|env)$ {
        return 404;
    }
}
