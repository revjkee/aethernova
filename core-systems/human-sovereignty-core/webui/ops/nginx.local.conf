# human-sovereignty-core/webui/ops/nginx.local.conf
#
# Local-only NGINX reverse proxy for Human Sovereignty WebUI.
# By default listens ONLY on localhost.
# Any attempt to expose externally must be an explicit decision.
#
# Verified use case:
#   nginx (localhost) -> FastAPI ASGI (127.0.0.1:8080)
#

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---- Logging (structured, minimal) ----
    log_format main
        '{"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time"}';

    access_log  logs/webui.access.log  main;
    error_log   logs/webui.error.log   warn;

    # ---- Hard limits ----
    client_max_body_size 256k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;

    # ---- TCP optimizations ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ---- Gzip (safe defaults) ----
    gzip on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;
    gzip_vary on;

    # ---- Upstream ASGI server ----
    upstream hsc_webui_backend {
        server 127.0.0.1:8080;
        keepalive 16;
    }

    # ---- Server (LOCALHOST ONLY) ----
    server {
        listen 127.0.0.1:80;
        server_name localhost;

        # Fail closed: any other Host header is rejected
        if ($host != "localhost") {
            return 444;
        }

        # ---- Health endpoints (no auth, no proxy tricks) ----
        location = /healthz {
            proxy_pass http://hsc_webui_backend;
            proxy_set_header Host $host;
        }

        location = /readyz {
            proxy_pass http://hsc_webui_backend;
            proxy_set_header Host $host;
        }

        # ---- Metrics (localhost only) ----
        location = /metrics {
            allow 127.0.0.1;
            deny all;
            proxy_pass http://hsc_webui_backend;
            proxy_set_header Host $host;
        }

        # ---- Main API / WebUI ----
        location / {
            # ---- Proxy basics ----
            proxy_http_version 1.1;
            proxy_pass http://hsc_webui_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto http;

            # ---- Request ID propagation ----
            proxy_set_header X-Request-Id $request_id;

            # ---- mTLS identity headers (LOCAL DEV ONLY) ----
            # In local mode, TLS is usually terminated elsewhere or not used.
            # These headers are placeholders and must NOT be trusted outside localhost.
            proxy_set_header X-SSL-Client-Verify        "SUCCESS";
            proxy_set_header X-SSL-Client-S-DN          "";
            proxy_set_header X-SSL-Client-Fingerprint   "";

            # ---- Timeouts ----
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # ---- Buffering ----
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 16k;

            # ---- Security headers (safe for local dev) ----
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "no-referrer" always;
        }
    }
}
