# Конфигурация для oblivionvault-core

system:
  name: "oblivionvault-core"
  version: "1.0.0"
  debug: false

logging:
  level: "INFO"
  format: "{time} | {level} | {message}"
  file: "logs/oblivionvault-core.log"

integration:
  enabled: true
  core_systems_path: "/workspaces/aethernova/core-systems"
  
security:
  enabled: true
  encryption_key: null

