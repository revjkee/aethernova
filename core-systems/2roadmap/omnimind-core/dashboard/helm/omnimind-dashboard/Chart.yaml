apiVersion: v2
name: omnimind-dashboard
description: >
  OmniMind Core Dashboard — промышленный SPA (Vite/React) для управления мультиагентным ядром.
  Чарт разворачивает stateless веб-приложение за NGINX, с поддержкой Ingress, HPA,
  строгих securityContext и настраиваемых заголовков безопасности.
type: application

# Версия чарта (semver). Обновляется при изменениях шаблонов/values.
version: 0.1.0

# Версия приложения (контейнерного образа). Может переопределяться через --set image.tag=...
appVersion: "0.1.0"

kubeVersion: ">=1.25.0-0"

home: https://dashboard.omnimind.example.com
icon: https://dashboard.omnimind.example.com/assets/icon.png

sources:
  - https://github.com/ORG/REPO/tree/main/core-systems/omnimind-core/dashboard
keywords:
  - omnimind
  - dashboard
  - spa
  - observability
  - frontend
  - helm

maintainers:
  - name: Aethernova SRE
    email: sre@aethernova.example.com
  - name: OmniMind Frontend Team
    email: frontend@aethernova.example.com

annotations:
  # Artifact Hub метаданные (см. https://artifacthub.io/docs/topics/annotations/).
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "true"
  artifacthub.io/signKey: |
    fingerprint: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    url: "https://keys.example.com/helm.pub"
  artifacthub.io/images: |
    - name: omnimind-dashboard
      image: registry.example.com/omnimind/dashboard:0.1.0
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.omnimind.example.com
    - name: Source
      url: https://github.com/ORG/REPO
    - name: Security
      url: https://security.aethernova.example.com/vuln-reporting

# Опциональные зависимости. Отключены по умолчанию, включаются через values.
# Пример: oauth2-proxy как sidecar/под-chart для SSO (если требуется).
dependencies:
  - name: oauth2-proxy
    version: "6.x.x"
    repository: "https://helm.oauth2-proxy.github.io/manifests"
    condition: oauth2Proxy.enabled
    tags:
      - sso
