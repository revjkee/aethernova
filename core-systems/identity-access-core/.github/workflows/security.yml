name: Security

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          warn-only: false

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            name: "identity-access-core-codeql"
            disable-default-queries: false

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  trivy-fs:
    name: Trivy FS (Vuln, Misconfig, Secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_DISABLE_VEX_NOTICE: "true"
      TRIVY_SKIP_DB_UPDATE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
          scanners: "vuln,misconfig,secret"

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy.sarif"
          category: "trivy-fs"

  policy:
    name: Workflow policy checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Enforce minimal permissions (documentation)
        run: |
          echo "This workflow is configured with least-privilege GITHUB_TOKEN permissions."
          echo "See GitHub docs: Automatic token authentication and secure use reference."
