# core-systems/identity-access-core/config/app/staging.yaml
# Staging config: safe defaults, no hardcoded secrets. Secrets must be injected via environment/secret manager. :contentReference[oaicite:1]{index=1}

app:
  name: "identity-access-core"
  environment: "staging"
  instance_id: "${INSTANCE_ID}"
  version: "${APP_VERSION}"
  timezone: "UTC"

server:
  host: "0.0.0.0"
  port: 8080
  public_base_url: "${PUBLIC_BASE_URL}"
  forwarded_allow_ips: "${FORWARDED_ALLOW_IPS}"
  proxy_headers: true
  workers: 2
  graceful_shutdown_seconds: 25

security:
  # Do not store secrets in repo configs; inject via secret manager / env. :contentReference[oaicite:2]{index=2}
  secret_key: "${SECRET_KEY}"
  token_issuer: "${TOKEN_ISSUER}"
  token_audience: "${TOKEN_AUDIENCE}"
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 1209600
  password_hash:
    algorithm: "argon2id"
    argon2:
      time_cost: 3
      memory_kib: 65536
      parallelism: 2
  mfa:
    enabled: true
    totp_issuer: "Aethernova"
  session:
    cookie_name: "aethernova_iac_session"
    cookie_secure: true
    cookie_http_only: true
    cookie_same_site: "lax"
  headers:
    hsts_seconds: 31536000
    hsts_include_subdomains: true
    hsts_preload: false
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    referrer_policy: "no-referrer"
    content_security_policy: "${CSP_POLICY}"
  rate_limit:
    enabled: true
    global_rps: 30
    burst: 60
    by_ip: true
  ip_allowlist:
    enabled: false
    cidrs: []

cors:
  enabled: true
  allow_credentials: true
  allow_origins:
    - "${CORS_ORIGIN_1}"
    - "${CORS_ORIGIN_2}"
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allow_headers: ["Authorization", "Content-Type", "X-Request-Id", "X-CSRF-Token"]
  max_age_seconds: 600

csrf:
  enabled: true
  header_name: "X-CSRF-Token"

logging:
  level: "INFO"
  format: "json"
  include_trace_id: true
  include_request_id: true
  redact:
    enabled: true
    fields:
      - "password"
      - "new_password"
      - "token"
      - "access_token"
      - "refresh_token"
      - "authorization"
      - "cookie"
      - "secret"
  sampling:
    enabled: true
    rate: 1.0

observability:
  # OpenTelemetry uses standardized env var configuration across implementations. :contentReference[oaicite:3]{index=3}
  otel:
    enabled: true
    service_name: "identity-access-core"
    service_namespace: "aethernova"
    exporter: "otlp"
    endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
    protocol: "${OTEL_EXPORTER_OTLP_PROTOCOL}"
    headers: "${OTEL_EXPORTER_OTLP_HEADERS}"
    resource_attributes: "${OTEL_RESOURCE_ATTRIBUTES}"
    traces_sampler: "${OTEL_TRACES_SAMPLER}"
    traces_sampler_arg: "${OTEL_TRACES_SAMPLER_ARG}"
  health:
    enabled: true
    path: "/healthz"
  metrics:
    enabled: true
    path: "/metrics"

database:
  driver: "postgresql"
  dsn: "${DATABASE_DSN}"
  pool:
    min_size: 2
    max_size: 10
    max_idle_seconds: 300
    statement_timeout_ms: 25000
  migrations:
    auto_run: false

redis:
  enabled: true
  url: "${REDIS_URL}"
  db: 0
  timeouts:
    connect_ms: 2000
    read_ms: 2000
    write_ms: 2000
  cache:
    default_ttl_seconds: 300
  locks:
    enabled: true
    default_ttl_seconds: 15

message_broker:
  kind: "rabbitmq"
  url: "${RABBITMQ_URL}"
  exchange: "identity_access"
  queues:
    events: "identity_access.events"
    jobs: "identity_access.jobs"
  retry:
    max_attempts: 8
    base_delay_ms: 200
    max_delay_ms: 5000

email:
  enabled: true
  provider: "${EMAIL_PROVIDER}"
  from_address: "${EMAIL_FROM}"
  smtp:
    host: "${SMTP_HOST}"
    port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"

features:
  registration: true
  password_reset: true
  audit_log: true
  rbac: true
  device_fingerprint: true

audit:
  enabled: true
  retention_days: 30
  pii:
    minimize: true
  sinks:
    - "db"
    - "otel"

limits:
  request_body_max_bytes: 1048576
  json_depth_max: 64

ci:
  build_id: "${CI_BUILD_ID}"
  commit_sha: "${GIT_SHA}"
  deployed_at: "${DEPLOYED_AT}"
