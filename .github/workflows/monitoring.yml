name: Health Monitoring & Alerts

on:
  schedule:
    # Проверка каждые 15 минут
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to monitor'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      alert_level:
        description: 'Alert level threshold'
        required: false
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - error
          - critical

env:
  MONITORING_TIMEOUT: 30

jobs:
  # Проверка здоровья системы
  health-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [production, staging]
        service: [api, agents, workflows, monitoring, redis, database]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment URLs
        run: |
          case "${{ matrix.environment }}" in
            "production")
              echo "BASE_URL=https://ai-agents.aethernova.com" >> $GITHUB_ENV
              echo "API_URL=https://api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
            "staging")
              echo "BASE_URL=https://staging.ai-agents.aethernova.com" >> $GITHUB_ENV
              echo "API_URL=https://staging-api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
          esac

      - name: Check API health
        if: matrix.service == 'api'
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/health_response.json \
            "${{ env.API_URL }}/health" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          echo "HTTP_STATUS=$response" >> $GITHUB_ENV
          
          if [ "$response" = "200" ]; then
            echo "✅ API health check passed"
            cat /tmp/health_response.json | jq .
          else
            echo "❌ API health check failed with status: $response"
            exit 1
          fi

      - name: Check Agents system
        if: matrix.service == 'agents'
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/agents_response.json \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/agents" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          if [ "$response" = "200" ]; then
            agent_count=$(cat /tmp/agents_response.json | jq 'length')
            active_agents=$(cat /tmp/agents_response.json | jq '[.[] | select(.status=="running")] | length')
            
            echo "✅ Agents system healthy - Total: $agent_count, Active: $active_agents"
            echo "AGENT_COUNT=$agent_count" >> $GITHUB_ENV
            echo "ACTIVE_AGENTS=$active_agents" >> $GITHUB_ENV
            
            # Проверка минимального количества активных агентов
            if [ "$active_agents" -lt 3 ]; then
              echo "⚠️ Warning: Low number of active agents ($active_agents)"
              echo "ALERT_LEVEL=warning" >> $GITHUB_ENV
            fi
          else
            echo "❌ Agents system check failed with status: $response"
            exit 1
          fi

      - name: Check Workflows system
        if: matrix.service == 'workflows'
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/workflows_response.json \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/workflows" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          if [ "$response" = "200" ]; then
            workflow_count=$(cat /tmp/workflows_response.json | jq '.active_workflows // 0')
            echo "✅ Workflows system healthy - Active workflows: $workflow_count"
          else
            echo "❌ Workflows system check failed with status: $response"
            exit 1
          fi

      - name: Check Monitoring system
        if: matrix.service == 'monitoring'
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/monitoring_response.json \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/monitoring/metrics" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          if [ "$response" = "200" ]; then
            system_health=$(cat /tmp/monitoring_response.json | jq -r '.system_health // "unknown"')
            echo "✅ Monitoring system healthy - System health: $system_health"
            
            if [ "$system_health" != "healthy" ]; then
              echo "⚠️ Warning: System health is $system_health"
              echo "ALERT_LEVEL=warning" >> $GITHUB_ENV
            fi
          else
            echo "❌ Monitoring system check failed with status: $response"
            exit 1
          fi

      - name: Check Redis connectivity
        if: matrix.service == 'redis'
        run: |
          # Проверка через API endpoint для Redis stats
          response=$(curl -s -w "%{http_code}" -o /tmp/redis_response.json \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/monitoring/redis" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          if [ "$response" = "200" ]; then
            redis_status=$(cat /tmp/redis_response.json | jq -r '.status // "unknown"')
            echo "✅ Redis connectivity check passed - Status: $redis_status"
          else
            echo "❌ Redis connectivity check failed with status: $response"
            exit 1
          fi

      - name: Check Database connectivity
        if: matrix.service == 'database'
        run: |
          response=$(curl -s -w "%{http_code}" -o /tmp/db_response.json \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/monitoring/database" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "000"
          
          if [ "$response" = "200" ]; then
            db_status=$(cat /tmp/db_response.json | jq -r '.status // "unknown"')
            echo "✅ Database connectivity check passed - Status: $db_status"
          else
            echo "❌ Database connectivity check failed with status: $response"
            exit 1
          fi

      - name: Record health status
        if: always()
        run: |
          status="${{ job.status }}"
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Recording health status for ${{ matrix.environment }}/${{ matrix.service }}: $status"
          
          # Сохранение в артефакт для последующего анализа
          echo "{
            \"environment\": \"${{ matrix.environment }}\",
            \"service\": \"${{ matrix.service }}\",
            \"status\": \"$status\",
            \"timestamp\": \"$timestamp\",
            \"http_status\": \"${{ env.HTTP_STATUS }}\",
            \"alert_level\": \"${{ env.ALERT_LEVEL }}\"
          }" > health-${{ matrix.environment }}-${{ matrix.service }}.json

      - name: Upload health status
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: health-status-${{ matrix.environment }}-${{ matrix.service }}
          path: health-${{ matrix.environment }}-${{ matrix.service }}.json

  # Проверка производительности
  performance-monitoring:
    runs-on: ubuntu-latest
    needs: health-check
    if: always()
    
    strategy:
      matrix:
        environment: [production, staging]
    
    steps:
      - name: Set environment URLs
        run: |
          case "${{ matrix.environment }}" in
            "production")
              echo "API_URL=https://api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
            "staging")
              echo "API_URL=https://staging-api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
          esac

      - name: Measure API response times
        run: |
          endpoints=(
            "/health"
            "/api/v1/agents"
            "/api/v1/monitoring/metrics"
          )
          
          echo "Measuring response times for ${{ matrix.environment }}"
          
          for endpoint in "${endpoints[@]}"; do
            echo "Testing endpoint: $endpoint"
            
            # Измерение времени отклика
            response_time=$(curl -w "%{time_total}" -s -o /dev/null \
              -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
              "${{ env.API_URL }}$endpoint" \
              --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "timeout"
            
            echo "Response time for $endpoint: ${response_time}s"
            
            # Проверка на медленные ответы
            if (( $(echo "$response_time > 2.0" | bc -l) )); then
              echo "⚠️ Slow response detected: ${response_time}s for $endpoint"
              echo "SLOW_ENDPOINT=$endpoint" >> $GITHUB_ENV
              echo "SLOW_TIME=$response_time" >> $GITHUB_ENV
            fi
          done

      - name: Check resource utilization
        run: |
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}/api/v1/monitoring/metrics" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "{}"
          
          if [ "$response" != "{}" ]; then
            cpu_usage=$(echo "$response" | jq -r '.cpu_usage_percent // 0')
            memory_usage=$(echo "$response" | jq -r '.memory_usage_percent // 0')
            
            echo "CPU Usage: ${cpu_usage}%"
            echo "Memory Usage: ${memory_usage}%"
            
            # Проверка высокого использования ресурсов
            if (( $(echo "$cpu_usage > 80" | bc -l) )); then
              echo "🚨 High CPU usage detected: ${cpu_usage}%"
              echo "HIGH_CPU=$cpu_usage" >> $GITHUB_ENV
            fi
            
            if (( $(echo "$memory_usage > 85" | bc -l) )); then
              echo "🚨 High memory usage detected: ${memory_usage}%"
              echo "HIGH_MEMORY=$memory_usage" >> $GITHUB_ENV
            fi
          fi

  # Анализ логов и ошибок
  log-analysis:
    runs-on: ubuntu-latest
    needs: health-check
    if: always()
    
    strategy:
      matrix:
        environment: [production, staging]
        log_type: [errors, warnings, performance]
    
    steps:
      - name: Set environment URLs
        run: |
          case "${{ matrix.environment }}" in
            "production")
              echo "API_URL=https://api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
            "staging")
              echo "API_URL=https://staging-api.ai-agents.aethernova.com" >> $GITHUB_ENV
              ;;
          esac

      - name: Fetch recent logs
        run: |
          log_endpoint=""
          case "${{ matrix.log_type }}" in
            "errors")
              log_endpoint="/api/v1/monitoring/logs/errors"
              ;;
            "warnings")
              log_endpoint="/api/v1/monitoring/logs/warnings"
              ;;
            "performance")
              log_endpoint="/api/v1/monitoring/logs/performance"
              ;;
          esac
          
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            "${{ env.API_URL }}$log_endpoint?limit=100&since=15m" \
            --max-time ${{ env.MONITORING_TIMEOUT }}) || echo "[]"
          
          log_count=$(echo "$response" | jq 'length // 0')
          echo "Found $log_count ${{ matrix.log_type }} entries in last 15 minutes"
          
          # Сохранение логов для анализа
          echo "$response" > logs-${{ matrix.environment }}-${{ matrix.log_type }}.json
          
          # Проверка на критические ошибки
          if [ "${{ matrix.log_type }}" = "errors" ] && [ "$log_count" -gt 10 ]; then
            echo "🚨 High error rate detected: $log_count errors in 15 minutes"
            echo "HIGH_ERROR_RATE=$log_count" >> $GITHUB_ENV
          fi

      - name: Upload log analysis
        uses: actions/upload-artifact@v3
        with:
          name: logs-${{ matrix.environment }}-${{ matrix.log_type }}
          path: logs-${{ matrix.environment }}-${{ matrix.log_type }}.json

  # Генерация сводного отчета и алертов
  generate-report:
    runs-on: ubuntu-latest
    needs: [health-check, performance-monitoring, log-analysis]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all monitoring artifacts
        uses: actions/download-artifact@v3

      - name: Generate monitoring report
        run: |
          echo "# AI Agents System Monitoring Report" > monitoring-report.md
          echo "" >> monitoring-report.md
          echo "**Generated:** $(date -u)" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          # Анализ health checks
          echo "## Health Check Summary" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          failed_checks=0
          warning_checks=0
          
          for health_file in health-status-*/health-*.json; do
            if [ -f "$health_file" ]; then
              env=$(jq -r '.environment' "$health_file")
              service=$(jq -r '.service' "$health_file")
              status=$(jq -r '.status' "$health_file")
              alert_level=$(jq -r '.alert_level // "info"' "$health_file")
              
              if [ "$status" = "failure" ]; then
                echo "- ❌ **$env/$service**: FAILED" >> monitoring-report.md
                ((failed_checks++))
              elif [ "$alert_level" = "warning" ]; then
                echo "- ⚠️ **$env/$service**: WARNING" >> monitoring-report.md
                ((warning_checks++))
              else
                echo "- ✅ **$env/$service**: OK" >> monitoring-report.md
              fi
            fi
          done
          
          echo "" >> monitoring-report.md
          echo "**Summary:** $failed_checks failures, $warning_checks warnings" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          # Установка переменных для алертов
          echo "FAILED_CHECKS=$failed_checks" >> $GITHUB_ENV
          echo "WARNING_CHECKS=$warning_checks" >> $GITHUB_ENV

      - name: Check for critical alerts
        id: alerts
        run: |
          critical_alert=false
          alert_message=""
          
          if [ "${{ env.FAILED_CHECKS }}" -gt 0 ]; then
            critical_alert=true
            alert_message="🚨 CRITICAL: ${{ env.FAILED_CHECKS }} health checks failed!"
          elif [ "${{ env.WARNING_CHECKS }}" -gt 3 ]; then
            critical_alert=true
            alert_message="⚠️ WARNING: ${{ env.WARNING_CHECKS }} health checks have warnings!"
          fi
          
          echo "critical_alert=$critical_alert" >> $GITHUB_OUTPUT
          echo "alert_message=$alert_message" >> $GITHUB_OUTPUT

      - name: Upload monitoring report
        uses: actions/upload-artifact@v3
        with:
          name: monitoring-report
          path: monitoring-report.md

      - name: Send Slack alert for critical issues
        if: steps.alerts.outputs.critical_alert == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            ${{ steps.alerts.outputs.alert_message }}
            
            Failed checks: ${{ env.FAILED_CHECKS }}
            Warning checks: ${{ env.WARNING_CHECKS }}
            
            Time: $(date -u)
            
            Please check the monitoring dashboard immediately!

      - name: Create GitHub issue for critical failures
        if: steps.alerts.outputs.critical_alert == 'true' && env.FAILED_CHECKS > 0
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🚨 Critical System Alert: ${process.env.FAILED_CHECKS} health checks failed`;
            const body = `
            ## Critical System Alert
            
            **Alert Time:** ${new Date().toISOString()}
            **Failed Checks:** ${process.env.FAILED_CHECKS}
            **Warning Checks:** ${process.env.WARNING_CHECKS}
            
            ## Next Steps
            1. Check the monitoring dashboard
            2. Review system logs
            3. Verify service connectivity
            4. Check resource utilization
            
            ## Monitoring Report
            See attached artifacts for detailed monitoring report.
            
            **Priority:** Critical
            **Environment:** Production/Staging
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['critical', 'monitoring', 'alert']
            });

      - name: Send status update to monitoring webhook
        if: always()
        run: |
          curl -X POST "${{ secrets.MONITORING_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "timestamp": "'$(date -u)'",
              "status": "${{ job.status }}",
              "failed_checks": '${{ env.FAILED_CHECKS }}',
              "warning_checks": '${{ env.WARNING_CHECKS }}',
              "environment": "github_actions",
              "workflow": "health-monitoring"
            }' || echo "Failed to send monitoring webhook"