name: NeuroCity Full CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_IMAGE: "neurocity/core"
  REGISTRY: ghcr.io/${{ github.repository }}
  CACHE_VERSION: v1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
# ==========================================================
# 1. BACKEND BUILD + TEST
# ==========================================================
  backend:
    name: Backend • FastAPI
    runs-on: [self-hosted, linux, x64, agents]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Lint & Test
        run: |
          pip install pytest flake8 bandit
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          pytest backend -v --maxfail=1 --disable-warnings

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}:${{ github.sha }} -f backend/Dockerfile .
          echo "IMAGE=${{ env.REGISTRY }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}:${{ github.sha }}

# ==========================================================
# 2. FRONTEND BUILD + TEST
# ==========================================================
  frontend:
    name: Frontend • React/Vite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test --if-present
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: frontend/dist

# ==========================================================
# 3. SECURITY / STATIC ANALYSIS
# ==========================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: 0
          path: .

      - name: Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r backend -ll || true

# ==========================================================
# 4. AGENT INTEGRATION TESTS
# ==========================================================
  agents:
    name: Agents Orchestration
    runs-on: [self-hosted, linux, x64, agents]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
      - name: Launch agents system test
        run: |
          python -m backend.ai_core.agents.workflows &
          sleep 5
          pytest tests/agents -v || true
          pkill -f "backend.ai_core.agents.workflows" || true

# ==========================================================
# 5. DOCKER COMPOSE STAGING DEPLOY
# ==========================================================
  deploy-staging:
    name: Deploy • Staging
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}:${{ github.sha }}
            mkdir -p /opt/neurocity/frontend
            rm -rf /opt/neurocity/frontend/*
            exit 0

# ==========================================================
# 6. PRODUCTION DEPLOY (CD)
# ==========================================================
  deploy-prod:
    name: Deploy • Production
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.REGISTRY }}:${{ github.sha }}
            cd /opt/neurocity && docker compose -f docker-compose.prod.yml up -d
            docker image prune -af || true

# ==========================================================
# 7. NOTIFICATIONS (optional)
# ==========================================================
  notify:
    name: Notify
    needs: [deploy-staging, deploy-prod]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ✅ *${{ github.workflow }}* finished  
            Repo: ${{ github.repository }}  
            Branch: ${{ github.ref_name }}  
            Status: ${{ job.status }}
