name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repository:
    name: Repository contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit tracked files and active Python
        run: python tools/repository_audit.py

      - name: Validate Compose
        env:
          POSTGRES_USER: aethernova
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: aethernova
          GRAFANA_ADMIN_PASSWORD: test-password
          ZABBIX_DB_PASSWORD: test-password
        run: docker compose config --quiet

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend unit tests
        run: python -m pytest backend/tests/unit -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: [repository, backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aethernova/backend:ci
