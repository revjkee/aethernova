# Issue templates for AI Agents project

name: 🐛 Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: terms
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have read the documentation
          required: true
        - label: This issue is related to AI Agents system
          required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of AI Agents are you using?
      placeholder: "v1.2.3"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Base Agents
        - Meta-Generals
        - Role Agents
        - Registry
        - Monitoring
        - API Management
        - Integration
        - Workflows
        - Queue System
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: In what environment did this occur?
      options:
        - Development
        - Staging
        - Production
        - Testing
        - Docker
        - Kubernetes
        - Local
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to...
        2. Click on...
        3. Scroll down to...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe actual behavior...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant error messages or logs
      render: shell
      placeholder: Paste error logs here...

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant configuration files or settings
      render: yaml
      placeholder: |
        agents:
          monitoring:
            enabled: true
        # ... your config

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any additional information...

---

name: ✨ Feature Request
description: Suggest an idea for AI Agents
title: "[Feature]: "
labels: ["enhancement", "feature-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please provide detailed information about your request.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: This feature doesn't exist in the current version
          required: true
        - label: This feature aligns with project goals
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What category does this feature belong to?
      options:
        - Agent Capabilities
        - Monitoring & Analytics
        - API & Integration
        - Workflow Management
        - Performance & Scalability
        - Security & Authentication
        - User Interface
        - Developer Experience
        - Documentation
        - Testing & Quality
        - Configuration
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low - Nice to have
        - Medium - Would be helpful
        - High - Important for adoption
        - Critical - Blocking current use
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: |
        As a [user type], I want [capability] so that [benefit].
        
        Currently, [describe current limitation or problem]...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution
      placeholder: |
        I would like to see [specific feature/capability]...
        
        This could work by [describe how it might work]...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Describe alternatives you've considered
      placeholder: |
        Alternative 1: [describe]
        Alternative 2: [describe]
        ...

  - type: textarea
    id: examples
    attributes:
      label: Examples & Use Cases
      description: Provide concrete examples of how this would be used
      placeholder: |
        Example 1: [scenario and how feature helps]
        Example 2: [scenario and how feature helps]
        ...

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What would make this feature complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Documentation updated
        - [ ] Tests added
        ...

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Any thoughts on how this could be implemented?
      placeholder: |
        This might involve:
        - Changes to [component]
        - New API endpoints for [purpose]
        - Configuration options for [settings]
        ...

---

name: 📚 Documentation Issue
description: Report an issue with documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Help us improve our documentation! Please provide specific details about what needs to be fixed or improved.

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What type of documentation is this about?
      options:
        - API Documentation
        - Getting Started Guide
        - Architecture Documentation
        - Integration Guide
        - Examples & Tutorials
        - Configuration Reference
        - Troubleshooting Guide
        - Contributing Guide
        - README
        - Code Comments
        - Other
    validations:
      required: true

  - type: input
    id: doc_url
    attributes:
      label: Documentation URL
      description: Link to the documentation page (if applicable)
      placeholder: https://docs.ai-agents.aethernova.com/...

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: What kind of documentation issue is this?
      options:
        - Content is incorrect or outdated
        - Content is missing or incomplete
        - Content is unclear or confusing
        - Broken links or references
        - Formatting or styling issues
        - Code examples don't work
        - Typos or grammar errors
        - Structure or organization issues
        - New documentation needed
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe the documentation issue in detail
      placeholder: |
        The documentation states that [X], but actually [Y].
        
        This is confusing because [reason]...
    validations:
      required: true

  - type: textarea
    id: current_content
    attributes:
      label: Current Content
      description: What does the documentation currently say? (if applicable)
      placeholder: Copy the current text here...

  - type: textarea
    id: suggested_content
    attributes:
      label: Suggested Improvement
      description: How should this be improved or corrected?
      placeholder: |
        Suggested changes:
        - Change [X] to [Y]
        - Add explanation of [Z]
        - Include example for [scenario]
        ...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context or screenshots
      placeholder: Add any other context about the documentation issue here...

---

name: 🔒 Security Issue
description: Report a security vulnerability (use private reporting for sensitive issues)
title: "[Security]: "
labels: ["security"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Important**: If this is a sensitive security vulnerability, please use GitHub's private vulnerability reporting instead of creating a public issue.

  - type: checkboxes
    id: sensitivity
    attributes:
      label: Security Issue Type
      description: Please confirm the type of security issue
      options:
        - label: This is a general security improvement (not sensitive)
          required: false
        - label: This is a potential vulnerability (consider private reporting)
          required: false
        - label: This is about security documentation or best practices
          required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity Level
      description: How severe do you consider this issue?
      options:
        - Low - Minor security improvement
        - Medium - Potential security risk
        - High - Significant security concern
        - Critical - Immediate security risk
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which component is affected?
      options:
        - API Authentication
        - Data Encryption
        - Input Validation
        - Access Control
        - Session Management
        - Dependencies
        - Configuration
        - Logging & Monitoring
        - Network Security
        - Container Security
        - Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Security Issue Description
      description: Describe the security concern (avoid sensitive details in public issues)
      placeholder: |
        General description of the security concern...
        
        Impact: [what could happen]
        Scope: [what is affected]
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Recommended Action
      description: What actions do you recommend?
      placeholder: |
        Recommended actions:
        - [action 1]
        - [action 2]
        - [action 3]

  - type: textarea
    id: references
    attributes:
      label: References
      description: Any relevant security advisories, CVEs, or documentation
      placeholder: |
        - CVE-XXXX-XXXXX
        - https://security-advisory-url
        - Related documentation...

---

name: 🚀 Performance Issue
description: Report a performance problem or optimization opportunity
title: "[Performance]: "
labels: ["performance"]
assignees: []

body:
  - type: dropdown
    id: performance_type
    attributes:
      label: Performance Issue Type
      description: What type of performance issue is this?
      options:
        - Slow Response Times
        - High Memory Usage
        - High CPU Usage
        - Scalability Issues
        - Resource Leaks
        - Database Performance
        - Network Performance
        - Startup Performance
        - Throughput Issues
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which component has the performance issue?
      options:
        - Agent Processing
        - API Endpoints
        - Database Operations
        - Message Queue
        - Monitoring System
        - Workflow Engine
        - Integration Layer
        - Authentication
        - Web Interface
        - Background Tasks
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Performance Issue Description
      description: Describe the performance problem
      placeholder: |
        What is slow or inefficient?
        When does this occur?
        How does it impact users?
    validations:
      required: true

  - type: textarea
    id: measurements
    attributes:
      label: Performance Measurements
      description: Provide specific metrics if available
      placeholder: |
        Current performance:
        - Response time: XXXms
        - CPU usage: XX%
        - Memory usage: XXX MB
        - Throughput: XX requests/second
        
        Expected performance:
        - Response time: should be <XXXms
        - etc.

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Describe the environment where this occurs
      placeholder: |
        - Environment: Production/Staging/Development
        - Load: XX concurrent users/agents
        - Hardware: CPU, RAM, etc.
        - Data size: XX records/files
        - Network: bandwidth, latency

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the performance issue
      placeholder: |
        1. Set up [specific conditions]
        2. Execute [specific operations]
        3. Monitor [specific metrics]
        4. Observe [performance problem]

  - type: textarea
    id: profiling
    attributes:
      label: Profiling Data
      description: Any profiling or diagnostic data
      placeholder: |
        Attach profiling reports, flame graphs, or diagnostic outputs...
        
        Top slow functions:
        - function_name: XXXms
        - another_function: XXXms