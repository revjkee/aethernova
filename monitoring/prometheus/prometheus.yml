global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aethernova-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "aethernova-observability-core"
    metrics_path: /metrics
    static_configs:
      - targets: ["observability-core:8080"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
