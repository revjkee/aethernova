# Конфигурация Prometheus для AetherNova AI Agents
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Метрики Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Системные метрики
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Метрики контейнеров
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Метрики Redis
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Метрики PostgreSQL
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Метрики приложения AetherNova
  - job_name: 'aethernova-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 10s

  # Метрики AI агентов
  - job_name: 'ai-agents'
    metrics_path: /metrics
    static_configs:
      - targets: ['ai-agents:8080']
    scrape_interval: 5s

  # Метрики agent_mash
  - job_name: 'agent-mash'
    metrics_path: /metrics
    static_configs:
      - targets: ['agent-mash:8001']
    scrape_interval: 10s