# Конфигурация системы интеграции AI-агентов

# Планировщик задач (Task Scheduler)
scheduler:
  # Интеграция с omnimind-core
  omnimind_core:
    enabled: true
    base_url: "http://localhost:8080/api/v1"
    timeout: 30
    retry_attempts: 3
    retry_delay: 5.0
    api_key: null  # Установить в переменных окружения
    
  # Fallback планировщик (локальный)
  fallback:
    enabled: true
    strategy: "priority_based"  # priority_based, round_robin, load_balanced
    max_concurrent_tasks: 100
    task_timeout: 3600  # секунды

# Интеграция агентов с планировщиком
integration:
  mode: "hybrid"  # pull, push, hybrid
  
  # Pull режим - агенты запрашивают задачи
  pull:
    interval: 10.0  # секунды
    batch_size: 5
    
  # Push режим - планировщик отправляет задачи
  push:
    webhook_url: "http://localhost:8000/api/v1/agent-callbacks"
    timeout: 30
    
  # Hybrid режим - комбинирует pull и push
  hybrid:
    pull_interval: 30.0
    push_enabled: true
    
  # Настройки назначения задач
  assignment:
    timeout: 300  # секунды
    max_concurrent_per_agent: 10
    heartbeat_interval: 30.0
    
  # Регистрация агентов
  registration:
    auto_register: true
    capability_mapping:
      "code_generation": ["DeveloperAgent"]
      "code_review": ["ReviewerAgent", "ArchitectAgent"]
      "testing": ["TesterAgent"]
      "architecture": ["ArchitectAgent", "SystemArchitect"]

# Система рабочих процессов (Workflows)
workflows:
  # Настройки движка
  engine:
    max_concurrent_workflows: 50
    monitoring_interval: 10.0  # секунды
    execution_history_limit: 1000
    
  # Таймауты по умолчанию
  timeouts:
    default_node_timeout: 3600  # секунды
    default_workflow_timeout: 7200  # секунды
    
  # Политики повторов
  retry_policies:
    default_max_retries: 3
    default_retry_delay: 5.0
    exponential_backoff: true
    
  # Предустановленные рабочие процессы
  templates:
    code_development:
      name: "Code Development Pipeline"
      description: "Полный цикл разработки кода"
      nodes:
        - name: "analyze_requirements"
          type: "task"
          agent_type: "ArchitectAgent"
        - name: "generate_code"
          type: "task" 
          agent_type: "DeveloperAgent"
          dependencies: ["analyze_requirements"]
        - name: "review_code"
          type: "task"
          agent_type: "ReviewerAgent" 
          dependencies: ["generate_code"]
        - name: "test_code"
          type: "task"
          agent_type: "TesterAgent"
          dependencies: ["review_code"]
          
    code_review:
      name: "Code Review Workflow"
      description: "Процесс ревью кода"
      nodes:
        - name: "static_analysis"
          type: "task"
          agent_type: "ReviewerAgent"
        - name: "security_check"
          type: "task"
          agent_type: "SecurityAgent"
          dependencies: ["static_analysis"]
        - name: "performance_analysis"
          type: "task"
          agent_type: "PerformanceAgent"
          dependencies: ["static_analysis"]
        - name: "final_review"
          type: "task"
          agent_type: "ArchitectAgent"
          dependencies: ["security_check", "performance_analysis"]

# API Management System
api_management:
  # Настройки сервера
  server:
    host: "0.0.0.0"
    port: 8000
    debug: false
    reload: false
    
  # Подключение к Redis
  redis:
    url: "redis://localhost:6379"
    db: 0
    max_connections: 100
    
  # CORS настройки
  cors:
    allow_origins: ["*"]  # В продакшене указать конкретные домены
    allow_credentials: true
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["*"]
    
  # Rate Limiting
  rate_limiting:
    enabled: true
    default_rules:
      - type: "per_minute"
        limit: 60
        window: 60
      - type: "per_hour"  
        limit: 1000
        window: 3600
      - type: "per_day"
        limit: 10000
        window: 86400
        
    # Специальные правила для endpoint'ов
    endpoint_rules:
      "/api/v1/agents":
        - type: "per_minute"
          limit: 30
      "/api/v1/tasks":
        - type: "per_minute"
          limit: 100
      "/api/v1/workflows":
        - type: "per_minute" 
          limit: 20
          
  # API ключи
  api_keys:
    secret_key: "change-this-in-production"  # Должен быть в переменных окружения
    default_expiry_days: 365
    
    # Группы разрешений
    permission_groups:
      readonly:
        - "agents:read"
        - "tasks:read"
        - "workflows:read"
        - "monitoring:read"
      standard:
        - "agents:read"
        - "agents:create"
        - "tasks:read"
        - "tasks:create"
        - "workflows:read"
        - "workflows:create" 
        - "monitoring:read"
      advanced:
        - "agents:*"
        - "tasks:*"
        - "workflows:*"
        - "monitoring:read"
      admin:
        - "*"
        
  # WebSocket настройки
  websocket:
    max_connections: 1000
    heartbeat_interval: 30  # секунды
    message_size_limit: 1048576  # 1MB
    
    # Топики для подписки
    topics:
      - "agent_status"
      - "task_events" 
      - "workflow_events"
      - "system_alerts"
      - "performance_metrics"
      
  # Мониторинг API
  monitoring:
    metrics_retention_days: 7
    enable_detailed_logging: true
    slow_request_threshold: 5.0  # секунды
    
# Интеграция с внешними системами
external_integrations:
  # GitHub интеграция
  github:
    enabled: false
    token: null  # Установить в переменных окружения
    webhook_secret: null
    
  # Slack интеграция  
  slack:
    enabled: false
    webhook_url: null
    bot_token: null
    
  # Jira интеграция
  jira:
    enabled: false
    server_url: null
    username: null
    api_token: null
    
# Настройки безопасности
security:
  # Шифрование
  encryption:
    algorithm: "AES-256-GCM"
    key_rotation_days: 90
    
  # Аудит
  audit:
    enabled: true
    log_all_requests: true
    log_sensitive_data: false
    retention_days: 90
    
  # IP ограничения
  ip_restrictions:
    enabled: false
    whitelist: []
    blacklist: []