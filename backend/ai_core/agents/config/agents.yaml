# Конфигурация системы AI Core Agents
system:
  name: "AI Core Agent System"
  version: "1.0.0"
  environment: "development"  # development, staging, production
  
# Настройки системы сообщений
message_bus:
  type: "rabbitmq"  # rabbitmq, in_memory
  connection:
    url: "amqp://guest:guest@localhost:5672/"
    heartbeat: 600
    connection_attempts: 3
    retry_delay: 5
  queues:
    default_queue: "agent_tasks"
    priority_queue: "priority_tasks"
    monitoring_queue: "monitoring_events"

# Настройки реестра агентов
registry:
  max_agents: 100
  health_check_interval: 30  # секунд
  task_timeout: 300  # секунд
  max_retries: 3
  load_balancing:
    strategy: "round_robin"  # round_robin, least_loaded, random
    enable_sticky_sessions: false

# Настройки политик
policies:
  resource_management:
    max_cpu_usage: 80.0  # процент
    max_memory_usage: 85.0  # процент
    max_concurrent_tasks: 10
  security:
    require_authentication: true
    allowed_task_types:
      - "design_system"
      - "generate_code" 
      - "review_code"
      - "create_tests"
      - "run_tests"
    blocked_operations:
      - "system_shutdown"
      - "delete_data"
  compliance:
    audit_all_tasks: true
    log_level: "INFO"
    retention_days: 90

# Мета-генералы
metagenerals:
  architect:
    enabled: true
    auto_start: true
    config:
      design_patterns: ["microservices", "event_driven", "layered"]
      default_technologies:
        backend: ["FastAPI", "Django"]
        frontend: ["React", "Vue"]
        database: ["PostgreSQL", "MongoDB"]
        
  evolver:
    enabled: true
    auto_start: true
    config:
      evolution_interval: 1800  # 30 minutes
      mutation_rate: 0.1
      population_size: 10
      target_fitness: 0.85
      
  guardian:
    enabled: true
    auto_start: true
    config:
      monitoring_interval: 30  # seconds
      security_scan_interval: 3600  # 1 hour
      alert_thresholds:
        cpu_usage: 90.0
        memory_usage: 95.0
        error_rate: 0.1

# Ролевые агенты
roles:
  architect:
    enabled: true
    instances: 2
    auto_start: true
    capabilities:
      - "system_design"
      - "architecture_planning"
      - "technology_selection"
    config:
      max_concurrent_designs: 5
      design_timeout: 3600  # 1 hour
      
  developer:
    enabled: true
    instances: 3
    auto_start: true
    capabilities:
      - "code_generation"
      - "bug_fixing"
      - "refactoring"
    config:
      supported_languages: ["python", "javascript", "typescript"]
      max_code_size: 10000  # lines
      
  tester:
    enabled: true
    instances: 2
    auto_start: true
    capabilities:
      - "test_creation"
      - "test_execution"
      - "coverage_analysis"
    config:
      test_frameworks:
        python: "pytest"
        javascript: "jest"
      coverage_threshold: 80.0
      
  reviewer:
    enabled: true
    instances: 2
    auto_start: true
    capabilities:
      - "code_review"
      - "architecture_review"
      - "security_review"
    config:
      review_standards:
        code_quality_threshold: 7.0
        security_score_threshold: 8.0
        auto_approve_threshold: 9.0

  # Дополнительные роли
  devops:
    enabled: false
    instances: 1
    capabilities:
      - "deployment"
      - "infrastructure_management"
      - "monitoring_setup"
      
  security:
    enabled: false
    instances: 1
    capabilities:
      - "vulnerability_scanning"
      - "penetration_testing"
      - "security_auditing"
      
  data_analyst:
    enabled: false
    instances: 1
    capabilities:
      - "data_analysis"
      - "report_generation"
      - "metrics_collection"

# Мониторинг и логирование
monitoring:
  enabled: true
  metrics_collection_interval: 30  # seconds  
  health_check_interval: 30  # seconds
  alert_check_interval: 10  # seconds
  retention_hours: 24
  health_checks:
    agent_health: true
    queue_health: true
    system_health: true
  alerts:
    email_notifications: false
    webhook_url: null
    slack_channel: null
  thresholds:
    cpu_warning: 80.0
    cpu_critical: 90.0
    memory_warning: 85.0
    memory_critical: 95.0
    error_rate_warning: 0.05  # 5%
    error_rate_critical: 0.1   # 10%
    response_time_warning: 2000  # 2 seconds
    response_time_critical: 5000 # 5 seconds

# Уведомления
notifications:
  enabled: true
  channels:
    email:
      enabled: false
      smtp_server: "smtp.gmail.com"
      smtp_port: 587
      username: "alerts@aethernova.ai"
      to_emails: ["admin@aethernova.ai"]
      severity_filter: ["critical", "warning"]
    slack:
      enabled: false
      webhook_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
      channel: "#ai-agents-alerts"
      severity_filter: ["critical", "warning"]
    webhook:
      enabled: false
      url: "https://your-webhook-endpoint.com/alerts"
      headers:
        "Authorization": "Bearer your-token"
        "Content-Type": "application/json"
      severity_filter: ["critical", "warning", "info"]

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    console:
      enabled: true
    file:
      enabled: true
      filename: "logs/ai_core_agents.log"
      max_size: "100MB"
      backup_count: 5
    
# API настройки
api:
  host: "0.0.0.0"
  port: 8000
  cors:
    enabled: true
    origins: ["*"]
    methods: ["GET", "POST", "PUT", "DELETE"]
  rate_limiting:
    enabled: true
    requests_per_minute: 100
  authentication:
    enabled: false
    jwt_secret: "your-secret-key"
    token_expiry: 3600  # seconds

# База данных (для хранения состояния)
database:
  type: "postgresql"  # postgresql, sqlite, memory
  connection:
    host: "localhost"
    port: 5432
    database: "ai_core_agents"
    username: "postgres"
    password: "password"
  pool:
    min_connections: 5
    max_connections: 20
    
# Кэширование
cache:
  type: "redis"  # redis, memory
  connection:
    host: "localhost"
    port: 6379
    database: 0
  ttl: 3600  # seconds

# Разработка и отладка
development:
  debug_mode: true
  auto_reload: true
  mock_external_services: true
  test_data:
    create_sample_tasks: false
    sample_agents_count: 5