# agent_mash/config/core_integration.yaml

# Конфигурация интеграции агентной системы с core-системами AetherNova
integration:
  name: "AetherNova Agent System Integration"
  version: "2.0.0"
  
  # Настройки core-систем
  core_systems:
    automation_core:
      enabled: true
      path: "../core-systems/automation-core/src"
      features:
        - http_client
        - task_pools
        - observability
        - security
        - concurrency
        - databases
      
    engine_core:
      enabled: true 
      path: "../core-systems/engine-core/src"
      features:
        - fastapi_server
        - typer_cli
        - health_checks
        - metrics_endpoint
        
    ai_platform_core:
      enabled: true
      path: "../core-systems/ai-platform-core/src"  
      features:
        - model_adapters
        - ai_orchestration
        - model_management

  # Настройки агентов с интеграцией
  agents:
    integrated_chatbots:
      count: 2
      capabilities:
        - text_processing
        - api_integration
        - core_http_client
      personality:
        risk_tolerance: 0.3
        curiosity_level: 0.8
        cooperation_tendency: 0.9
        confidence_threshold: 0.6
      learning_mode: "supervised"
      
    integrated_analysts:
      count: 1  
      capabilities:
        - data_analysis
        - pattern_recognition
        - web_scraping
        - core_automation
      personality:
        risk_tolerance: 0.2
        curiosity_level: 0.9
        cooperation_tendency: 0.6
        confidence_threshold: 0.8
      learning_mode: "unsupervised"
      
    integrated_specialists:
      count: 1
      capabilities:
        - database_ops
        - security_analysis  
        - performance_monitoring
        - core_observability
      personality:
        risk_tolerance: 0.1
        curiosity_level: 0.7
        cooperation_tendency: 0.8
        confidence_threshold: 0.9
      learning_mode: "reinforcement"

  # API интеграции через automation-core
  api_endpoints:
    external_apis:
      jsonplaceholder:
        base_url: "https://jsonplaceholder.typicode.com"
        timeout: 30.0
        max_retries: 3
        rate_limit: 100  # requests per minute
        
      httpbin:
        base_url: "https://httpbin.org"
        timeout: 15.0
        max_retries: 2
        rate_limit: 200
        
      news_api:
        base_url: "https://newsapi.org/v2"
        timeout: 30.0
        max_retries: 3
        rate_limit: 50
        requires_auth: true
        
      weather_api:
        base_url: "https://api.openweathermap.org/data/2.5"
        timeout: 20.0
        max_retries: 3
        rate_limit: 60
        requires_auth: true
        
    internal_apis:
      engine_core_health:
        base_url: "http://localhost:8000"
        endpoints:
          - "/health"
          - "/ready"
          - "/metrics"
        timeout: 10.0
        
      monitoring_dashboard:
        base_url: "http://localhost:8080"
        endpoints:
          - "/api/metrics"
          - "/api/agents"
          - "/api/tasks"
        timeout: 15.0

  # Настройки производительности
  performance:
    http_client:
      connection_pool_size: 20
      connection_timeout: 10.0
      read_timeout: 30.0
      max_keepalive_connections: 10
      
    task_pools:
      max_workers: 10
      queue_size: 100
      timeout: 300.0
      
    concurrency:
      max_concurrent_tasks: 50
      batch_size: 10
      processing_interval: 1.0

  # Настройки мониторинга и логирования
  monitoring:
    metrics:
      enabled: true
      collection_interval: 30.0
      prometheus_port: 9090
      
    logging:
      level: "INFO"
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      file_rotation: true
      max_file_size: "100MB"
      backup_count: 5
      
    observability:
      tracing_enabled: true
      jaeger_endpoint: "http://localhost:14268/api/traces"
      service_name: "aethernova-agent-system"
      
    health_checks:
      enabled: true
      check_interval: 60.0
      endpoints:
        - "/health"
        - "/ready"
        - "/metrics"

  # Настройки безопасности
  security:
    authentication:
      enabled: true
      token_validation: true
      jwt_secret_key: "${JWT_SECRET_KEY}"
      token_expiration: 3600  # seconds
      
    authorization:
      rbac_enabled: true
      permissions_file: "permissions.yaml"
      
    encryption:
      encrypt_sensitive_data: true
      encryption_key: "${ENCRYPTION_KEY}"
      
    rate_limiting:
      enabled: true
      default_rate: 100  # requests per minute
      burst_limit: 200
      
    input_validation:
      enabled: true
      max_input_size: "1MB"
      sanitize_inputs: true

  # Настройки базы данных (через automation-core)
  database:
    enabled: true
    connection_string: "${DATABASE_URL}"
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    pool_recycle: 3600
    
    migrations:
      auto_migrate: true
      migration_path: "migrations/"
      
    backup:
      enabled: true
      backup_interval: "24h"
      backup_retention: "30d"

  # Настройки развертывания
  deployment:
    mode: "production"  # development, staging, production
    
    docker:
      enabled: true
      image_tag: "aethernova-agents:${VERSION}"
      registry: "registry.aethernova.com"
      
    kubernetes:
      enabled: true
      namespace: "aethernova-agents"
      replicas: 3
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
          
    environment_variables:
      - JWT_SECRET_KEY
      - ENCRYPTION_KEY  
      - DATABASE_URL
      - REDIS_URL
      - API_KEYS

  # Настройки интеграционных тестов
  testing:
    enabled: true
    test_apis:
      - "https://httpbin.org/status/200"
      - "https://jsonplaceholder.typicode.com/posts/1"
      
    load_testing:
      enabled: true
      concurrent_users: 50
      test_duration: "5m"
      ramp_up_time: "1m"
      
    performance_benchmarks:
      max_response_time: 2.0  # seconds
      min_throughput: 100     # requests per second
      max_error_rate: 0.05    # 5%

  # Конфигурация задач по умолчанию
  default_tasks:
    - name: "System Health Check"
      type: "maintenance"
      schedule: "*/5 * * * *"  # каждые 5 минут
      capabilities: ["monitoring", "health_checks"]
      
    - name: "Performance Analysis" 
      type: "analytics"
      schedule: "0 */1 * * *"  # каждый час
      capabilities: ["data_analysis", "performance_monitoring"]
      
    - name: "Security Audit"
      type: "security"
      schedule: "0 2 * * *"    # каждый день в 2:00
      capabilities: ["security_analysis", "audit"]
      
    - name: "Data Backup"
      type: "maintenance"
      schedule: "0 3 * * *"    # каждый день в 3:00
      capabilities: ["database_ops", "backup"]

  # Уведомления и алерты
  notifications:
    enabled: true
    
    channels:
      email:
        enabled: true
        smtp_server: "smtp.aethernova.com"
        smtp_port: 587
        
      slack:
        enabled: true
        webhook_url: "${SLACK_WEBHOOK_URL}"
        
      telegram:
        enabled: true
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        
    alert_rules:
      - name: "High Error Rate"
        condition: "error_rate > 0.05"
        severity: "critical"
        channels: ["email", "slack"]
        
      - name: "High Response Time"
        condition: "avg_response_time > 5.0"
        severity: "warning" 
        channels: ["slack"]
        
      - name: "Agent Failure"
        condition: "agent_failures > 0"
        severity: "critical"
        channels: ["email", "slack", "telegram"]