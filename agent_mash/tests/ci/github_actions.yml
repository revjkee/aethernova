name: agent_mash_tests_ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit and integration tests
        run: |
          pytest agent_mash/tests \
            --strict-markers \
            --disable-warnings \
            --maxfail=1 \
            --junitxml=agent_mash/tests/reports/junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: agent_mash/tests/reports

      - name: Verify no raw security reports committed
        run: |
          if [ -n "$(ls -A agent_mash/tests/reports/security/sast/raw 2>/dev/null)" ]; then
            echo "Raw SAST directory is not empty"
            exit 1
          fi
