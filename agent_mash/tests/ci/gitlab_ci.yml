# agent_mash/tests/ci/gitlab_ci.yml

stages:
  - lint
  - test
  - compliance
  - security
  - report

variables:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

.default_python_job:
  image: python:${PYTHON_VERSION}
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip

lint:
  stage: lint
  extends: .default_python_job
  script:
    - pip install ruff
    - ruff agent_mash
  rules:
    - if: $CI_COMMIT_BRANCH

unit_tests:
  stage: test
  extends: .default_python_job
  script:
    - pytest agent_mash/tests/unit --junitxml=reports/unit/junit.xml
  artifacts:
    when: always
    reports:
      junit: reports/unit/junit.xml
    paths:
      - reports/unit/
  rules:
    - if: $CI_COMMIT_BRANCH

compliance_tests:
  stage: compliance
  extends: .default_python_job
  script:
    - pytest agent_mash/tests/compliance --junitxml=reports/compliance/junit.xml
  artifacts:
    when: always
    reports:
      junit: reports/compliance/junit.xml
    paths:
      - reports/compliance/
  rules:
    - if: $CI_COMMIT_BRANCH

data_contract_tests:
  stage: compliance
  extends: .default_python_job
  script:
    - pytest agent_mash/tests/test_data
  artifacts:
    when: always
    paths:
      - reports/data/
  rules:
    - if: $CI_COMMIT_BRANCH

sast:
  stage: security
  image: registry.gitlab.com/gitlab-org/security-products/sast:latest
  variables:
    SAST_EXCLUDED_PATHS: "tests,test_data"
  artifacts:
    when: always
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
  rules:
    - if: $CI_COMMIT_BRANCH

aggregate_reports:
  stage: report
  image: alpine:latest
  script:
    - mkdir -p reports/summary
    - echo "CI pipeline completed for ${CI_COMMIT_SHA}" > reports/summary/summary.txt
  artifacts:
    when: always
    paths:
      - reports/
  rules:
    - if: $CI_COMMIT_BRANCH
