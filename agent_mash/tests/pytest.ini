# agent_mash/tests/pytest.ini
[pytest]

# Минимально требуемая версия pytest (падает, если ниже).
minversion = 7.0

# Базовые опции запуска.
# -ra: краткое резюме по skipped/xfail/xpass и т.п.
# --strict-config: ошибка при неизвестных ключах в конфиге
# --strict-markers: ошибка при незарегистрированных маркерах
# --showlocals: локальные переменные в трейсбэке
# --tb=short: компактный трейсбэк без потери сути
addopts =
    -ra
    --strict-config
    --strict-markers
    --showlocals
    --tb=short

# Где искать тесты.
testpaths =
    tests

# Паттерны для discovery.
python_files =
    test_*.py
python_classes =
    Test*
python_functions =
    test_*

# Делать XPASS ошибкой на уровне проекта.
xfail_strict = true

# Предупреждения: превращаем в ошибки, чтобы не копить техдолг.
filterwarnings =
    error

# Регистрация маркеров (обязательна при --strict-markers).
# Добавляй сюда ВСЕ кастомные маркеры, которые используешь.
markers =
    unit: быстрые модульные тесты без внешних зависимостей
    integration: тесты интеграции с сервисами/БД/внешними компонентами
    e2e: сквозные тесты через реальные пользовательские сценарии
    slow: долгие тесты, которые обычно выносятся в отдельный CI job
    smoke: минимальный набор проверок для быстрых прогонов
    regression: регрессионные тесты для критичных багфиксов

# Логирование (живые логи в консоль).
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s.%(msecs)03d %(levelname)s %(name)s:%(lineno)d %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Также настраиваем формат для логов, которые попадут в отчёты/файлы,
# если в CI включишь соответствующие параметры.
log_format = %(asctime)s.%(msecs)03d %(levelname)s %(name)s:%(lineno)d %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# JUnit XML (часто используется CI системами).
# xunit2 — текущий формат семейства junit.
junit_family = xunit2
junit_logging = all
junit_log_passing_tests = true
