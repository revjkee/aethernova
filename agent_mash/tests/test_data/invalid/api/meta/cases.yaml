schema_version: 1
suite:
  name: invalid_api_requests
  description: >
    Negative API request cases (invalid inputs). This file is metadata only and is intended
    to be consumed by a test runner that submits JSON payloads and asserts error contracts.
defaults:
  content_type: application/json
  charset: utf-8
  expect:
    headers:
      content-type:
        contains: application/json
    error_object:
      required_keys:
        - error
        - message
  tags:
    - invalid
    - api

cases:
  - id: missing_request_id
    title: Missing request_id
    input_json: ../input/json/request_missing_request_id_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - request_id
            - missing
    tags:
      - required-field

  - id: invalid_request_id_format
    title: Invalid request_id format
    input_json: ../input/json/request_invalid_request_id_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - request_id
            - uuid
            - format
    tags:
      - format

  - id: missing_traceparent
    title: Missing traceparent
    input_json: ../input/json/request_missing_traceparent_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - traceparent
            - missing
    tags:
      - traceability
      - required-field

  - id: invalid_traceparent_format
    title: Invalid traceparent format
    input_json: ../input/json/request_invalid_traceparent_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - traceparent
            - w3c
            - format
    tags:
      - traceability
      - format

  - id: missing_payload
    title: Missing payload object
    input_json: ../input/json/request_missing_payload_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - payload
            - missing
    tags:
      - required-field

  - id: payload_wrong_type
    title: Payload is wrong type
    input_json: ../input/json/request_payload_wrong_type_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - payload
            - object
            - type
    tags:
      - type

  - id: payload_missing_action
    title: payload.action is missing
    input_json: ../input/json/request_payload_missing_action_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - payload.action
            - action
            - missing
    tags:
      - required-field

  - id: payload_invalid_action
    title: payload.action contains invalid value
    input_json: ../input/json/request_payload_invalid_action_01.json
    expect:
      status_code: 422
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - action
            - invalid
            - allowed
    tags:
      - enum

  - id: timestamp_invalid_format
    title: timestamp has invalid ISO8601 format
    input_json: ../input/json/request_timestamp_invalid_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - timestamp
            - iso
            - format
    tags:
      - format

  - id: idempotency_key_invalid
    title: idempotency_key invalid format
    input_json: ../input/json/request_idempotency_invalid_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - idempotency
            - key
            - uuid
            - format
    tags:
      - idempotency
      - format

  - id: actor_wrong_type
    title: actor.type invalid
    input_json: ../input/json/request_actor_wrong_type_01.json
    expect:
      status_code: 422
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - actor.type
            - invalid
            - allowed
    tags:
      - enum

  - id: params_items_wrong_type
    title: payload.params.items wrong type
    input_json: ../input/json/request_params_items_wrong_type_01.json
    expect:
      status_code: 400
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - items
            - array
            - type
    tags:
      - type

  - id: params_items_empty_key
    title: payload.params.items contains empty key
    input_json: ../input/json/request_params_items_empty_key_01.json
    expect:
      status_code: 422
      error_object:
        fields:
          error:
            equals: validation_error
        message:
          contains_any:
            - items
            - key
            - empty
            - required
    tags:
      - semantic

  - id: oversized_payload
    title: Payload too large
    input_json: ../input/json/request_payload_oversized_01.json
    expect:
      status_code: 413
      error_object:
        fields:
          error:
            equals: payload_too_large
        message:
          contains_any:
            - too large
            - payload
            - limit
    tags:
      - limits

  - id: invalid_content_type
    title: Wrong Content-Type header
    input_json: ../input/json/request_valid_01.json
    override:
      headers:
        content-type: text/plain
    expect:
      status_code: 415
      error_object:
        fields:
          error:
            equals: unsupported_media_type
        message:
          contains_any:
            - content-type
            - unsupported
    tags:
      - headers
