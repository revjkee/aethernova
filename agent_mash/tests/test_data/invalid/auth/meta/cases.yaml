# agent_mash/tests/test_data/invalid/auth/meta/cases.yaml
version: "1.0"
kind: "invalid-auth-cases"
description: "Negative authentication cases for Agent Mash API. Data-only; assertions are defined by expected.* fields."

conventions:
  request:
    method: "HTTP method"
    path: "Absolute API path starting with /"
    headers: "Map of request headers"
    query: "Optional map of query parameters"
    json: "Optional JSON body (object)"
  expected:
    status: "Expected HTTP status code"
    error:
      type: "Machine-readable error category"
      code: "Stable error code"
      message_contains: "Optional list of substrings that must be present in error message"
      fields:
        required: "List of required error fields in response JSON"
      headers:
        www_authenticate_contains: "Optional list of substrings expected in WWW-Authenticate header"
  normalization:
    error_object_paths:
      - "$.error"
      - "$.detail"
      - "$"
    acceptable_error_field_names:
      - "type"
      - "code"
      - "message"
      - "details"
      - "request_id"
      - "trace_id"

defaults:
  request:
    method: "GET"
    headers:
      Accept: "application/json"
  expected:
    error:
      fields:
        required: ["type", "code", "message"]

cases:
  - id: "auth_missing_all"
    title: "No credentials provided"
    request:
      method: "GET"
      path: "/v1/agents"
      headers: {}
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_MISSING"
        message_contains: ["missing", "authorization", "credentials"]
        headers:
          www_authenticate_contains: ["Bearer"]

  - id: "auth_missing_bearer_prefix"
    title: "Authorization header without Bearer prefix"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "token abc.def.ghi"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_FORMAT"
        message_contains: ["bearer", "format"]

  - id: "auth_bearer_empty_token"
    title: "Bearer with empty token"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer "
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_FORMAT"
        message_contains: ["empty", "token"]

  - id: "auth_bearer_non_jwt"
    title: "Bearer token is not a JWT"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer not-a-jwt"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_TOKEN"
        message_contains: ["jwt", "token"]

  - id: "auth_jwt_bad_segments"
    title: "JWT with invalid segments count"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer a.b"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_TOKEN"
        message_contains: ["segments", "token"]

  - id: "auth_jwt_bad_base64"
    title: "JWT with invalid base64 encoding"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer a..c"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_TOKEN"
        message_contains: ["base64", "decode"]

  - id: "auth_jwt_alg_none"
    title: "JWT with alg=none is rejected"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_ALG_NONE}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_UNSUPPORTED_ALG"
        message_contains: ["alg", "none", "unsupported"]

  - id: "auth_jwt_kid_unknown"
    title: "JWT signed with unknown kid"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_KID_UNKNOWN}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_KEY_NOT_FOUND"
        message_contains: ["kid", "key", "not found"]

  - id: "auth_jwt_bad_signature"
    title: "JWT signature verification fails"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_BAD_SIGNATURE}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_BAD_SIGNATURE"
        message_contains: ["signature", "invalid"]

  - id: "auth_jwt_expired"
    title: "Expired JWT is rejected"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_EXPIRED}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_TOKEN_EXPIRED"
        message_contains: ["expired", "exp"]

  - id: "auth_jwt_nbf_in_future"
    title: "JWT not valid yet (nbf in the future)"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_NBF_FUTURE}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_TOKEN_NOT_YET_VALID"
        message_contains: ["nbf", "not", "valid"]

  - id: "auth_jwt_iss_invalid"
    title: "JWT with invalid issuer"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_ISS_INVALID}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_ISSUER"
        message_contains: ["issuer", "iss", "invalid"]

  - id: "auth_jwt_aud_invalid"
    title: "JWT with invalid audience"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_AUD_INVALID}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_AUDIENCE"
        message_contains: ["audience", "aud", "invalid"]

  - id: "auth_jwt_missing_sub"
    title: "JWT missing subject claim"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_MISSING_SUB}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_CLAIMS"
        message_contains: ["sub", "missing", "claims"]

  - id: "auth_scope_insufficient"
    title: "Valid token but insufficient scope"
    request:
      method: "POST"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_SCOPE_READONLY}"
        Content-Type: "application/json"
      json:
        name: "e2e-agent-invalid-scope"
        kind: "generic"
    expected:
      status: 403
      error:
        type: "authz"
        code: "AUTHZ_INSUFFICIENT_SCOPE"
        message_contains: ["scope", "insufficient", "forbidden"]

  - id: "auth_tenant_mismatch"
    title: "Token tenant does not match requested resource tenant"
    request:
      method: "GET"
      path: "/v1/agents/${TEST_AGENT_ID_OTHER_TENANT}"
      headers:
        Authorization: "Bearer ${TEST_JWT_TENANT_A}"
        X-Tenant-Id: "${TEST_TENANT_B}"
    expected:
      status: 403
      error:
        type: "authz"
        code: "AUTHZ_TENANT_MISMATCH"
        message_contains: ["tenant", "mismatch", "forbidden"]

  - id: "auth_replay_nonce"
    title: "Replay detected by nonce/jti"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_REPLAYED_JTI}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_REPLAY_DETECTED"
        message_contains: ["replay", "jti", "nonce"]

  - id: "auth_basic_not_allowed"
    title: "Basic auth is not supported"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Basic Zm9vOmJhcg=="
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_UNSUPPORTED_SCHEME"
        message_contains: ["basic", "unsupported", "scheme"]

  - id: "auth_api_key_invalid"
    title: "Invalid API key"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        X-API-Key: "invalid-key"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_API_KEY"
        message_contains: ["api key", "invalid"]

  - id: "auth_api_key_missing"
    title: "API key header present but empty"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        X-API-Key: ""
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_API_KEY"
        message_contains: ["api key", "missing", "empty"]

  - id: "auth_cookie_tampered"
    title: "Session cookie tampered"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Cookie: "session=${TEST_SESSION_COOKIE_TAMPERED}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_INVALID_SESSION"
        message_contains: ["session", "invalid", "cookie"]

  - id: "auth_cookie_expired"
    title: "Session cookie expired"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Cookie: "session=${TEST_SESSION_COOKIE_EXPIRED}"
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_SESSION_EXPIRED"
        message_contains: ["session", "expired"]

  - id: "auth_header_injection"
    title: "Header injection attempt rejected"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer abc.def.ghi\r\nX-Evil: 1"
    expected:
      status: 400
      error:
        type: "request"
        code: "REQ_INVALID_HEADERS"
        message_contains: ["invalid", "header"]

  - id: "auth_large_token_rejected"
    title: "Excessively large token rejected"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Bearer ${TEST_JWT_OVERSIZE}"
    expected:
      status: 413
      error:
        type: "request"
        code: "REQ_PAYLOAD_TOO_LARGE"
        message_contains: ["too large", "payload", "token"]

  - id: "auth_malformed_www_auth_flow"
    title: "Malformed WWW-Authenticate negotiation is handled"
    request:
      method: "GET"
      path: "/v1/agents"
      headers:
        Authorization: "Digest username=\"x\""
    expected:
      status: 401
      error:
        type: "auth"
        code: "AUTH_UNSUPPORTED_SCHEME"
        message_contains: ["unsupported", "scheme"]
        headers:
          www_authenticate_contains: ["Bearer"]
