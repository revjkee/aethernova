schema_version: 1
suite:
  name: edge_case_api_requests
  description: >
    Edge-case API request scenarios. These cases are intended to validate
    boundary conditions, tolerance limits and ambiguous but formally valid inputs.
    Results may vary depending on strictness of server-side validation rules.

defaults:
  content_type: application/json
  charset: utf-8
  tags:
    - edge
    - api

cases:
  - id: minimal_valid_payload
    title: Minimal valid request payload
    input_json: ../input/json/request_minimal_valid_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
      error_object:
        absent: true
    tags:
      - minimal
      - boundary

  - id: empty_optional_objects
    title: Optional objects present but empty
    input_json: ../input/json/request_empty_optional_objects_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 400
      message_contains_any:
        - optional
        - empty
    tags:
      - optional
      - empty

  - id: max_length_strings
    title: Fields with maximum allowed string length
    input_json: ../input/json/request_max_length_strings_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 413
      message_contains_any:
        - length
        - limit
    tags:
      - limits
      - boundary

  - id: unicode_characters
    title: Unicode characters in text fields
    input_json: ../input/json/request_unicode_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 400
      message_contains_any:
        - unicode
        - encoding
    tags:
      - unicode
      - i18n

  - id: future_timestamp
    title: Timestamp set far in the future
    input_json: ../input/json/request_future_timestamp_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 422
      message_contains_any:
        - timestamp
        - future
    tags:
      - time
      - boundary

  - id: past_timestamp
    title: Timestamp set far in the past
    input_json: ../input/json/request_past_timestamp_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 422
      message_contains_any:
        - timestamp
        - past
    tags:
      - time
      - boundary

  - id: duplicate_idempotency_key
    title: Reused idempotency_key
    input_json: ../input/json/request_duplicate_idempotency_01.json
    precondition:
      description: Same idempotency_key already used in previous request
    expect:
      status_code_any_of:
        - 200
        - 409
      message_contains_any:
        - idempotency
        - duplicate
    tags:
      - idempotency
      - concurrency

  - id: large_items_array
    title: payload.params.items with large but allowed array size
    input_json: ../input/json/request_large_items_array_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 413
      message_contains_any:
        - items
        - limit
    tags:
      - limits
      - array

  - id: mixed_type_items
    title: payload.params.items contains mixed but serializable types
    input_json: ../input/json/request_mixed_type_items_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 400
      message_contains_any:
        - items
        - type
    tags:
      - type
      - ambiguity

  - id: unknown_additional_fields
    title: Request contains unknown additional fields
    input_json: ../input/json/request_with_extra_fields_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 400
      message_contains_any:
        - unknown
        - additional
    tags:
      - extensibility
      - compatibility

  - id: null_values_in_optional_fields
    title: Optional fields explicitly set to null
    input_json: ../input/json/request_null_optional_fields_01.json
    expect:
      status_code_any_of:
        - 200
        - 202
        - 400
      message_contains_any:
        - null
        - optional
    tags:
      - null
      - optional

  - id: whitespace_strings
    title: Strings containing only whitespace
    input_json: ../input/json/request_whitespace_strings_01.json
    expect:
      status_code_any_of:
        - 200
        - 400
        - 422
      message_contains_any:
        - whitespace
        - empty
    tags:
      - normalization
      - boundary
