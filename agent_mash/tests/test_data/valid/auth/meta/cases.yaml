version: "1.0"

domain: auth
entity: login
description: >
  Contract test cases for authentication login.
  This file defines valid login scenarios and binds input data
  with expected responses, headers snapshots and schemas.

invariants:
  - no_network_dependency
  - deterministic_inputs
  - stable_expected_outputs
  - no_real_user_data
  - no_real_secrets

cases:
  - id: auth_login_valid_01
    title: Valid login with correct credentials
    type: positive
    severity: normal

    input:
      format: json
      path: valid/auth/input/json/login_valid_01.json

    expected:
      http_status: 200

      body:
        format: json
        path: valid/auth/expected/json/login_response_ok_01.json

      headers_snapshot:
        format: json
        path: valid/auth/expected/snapshots/login_headers_snapshot_01.json

    schema:
      format: jsonschema
      path: valid/auth/meta/schema.json

    assertions:
      - body.status == "ok"
      - body.result.user.username == "user_test_01"
      - headers["x-auth-status"] == "success"

    tags:
      - auth
      - login
      - positive
      - contract
      - regression

    references:
      specification: auth.login.v1
      request_id: req_auth_valid_01
