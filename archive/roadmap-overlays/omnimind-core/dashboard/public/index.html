<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />

    <!-- Адаптивный вьюпорт -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Поддержка светлой/тёмной схемы (предпочтение + совместимость) -->
    <meta name="color-scheme" content="dark light" />
    <!-- Цвет UI для браузера в зависим. от схемы -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0F172A" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#E5E7EB" />

    <!-- Политика реферера (минимизация утечки лишних данных) -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Twitter: базовые мета для шаринга -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="OmniMind Core Dashboard" />
    <meta property="og:description" content="Панель управления OmniMind Core" />
    <meta property="og:image"       content="/logo.svg" />
    <meta property="og:url"         content="/" />
    <meta name="twitter:card"       content="summary" />
    <meta name="twitter:title"      content="OmniMind Core Dashboard" />
    <meta name="twitter:description" content="Панель управления OmniMind Core" />
    <meta name="twitter:image"      content="/logo.svg" />

    <!-- Иконки и манифест PWA -->
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Канонический URL -->
    <link rel="canonical" href="/" />

    <!-- Пример resource hints (раскомментируйте при фактическом использовании внешних источников)
    <link rel="preconnect" href="https://example-cdn.com" crossorigin />
    <link rel="preload" as="font" href="/fonts/Inter-Var.woff2" type="font/woff2" crossorigin />
    -->

    <!-- Базовые стили для мгновенного фона (предотвращение вспышек) -->
    <style>
      :root { color-scheme: dark light; }
      @media (prefers-color-scheme: dark)  { html { background: #0b1020; } }
      @media (prefers-color-scheme: light) { html { background: #ffffff; } }
      html, body, #app { height: 100%; margin: 0; }
    </style>

    <!-- CSP предпочтительно отдавать HTTP-заголовком; meta-вариант — минимальный базис -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src  'self';
            style-src   'self' 'unsafe-inline';
            img-src     'self' data: blob:;
            font-src    'self' data:;
            connect-src 'self';
            object-src  'none';
            base-uri    'self';
            frame-ancestors 'none';
          ">

    <title>OmniMind Core Dashboard</title>
  </head>

  <body>
    <noscript>Для работы приложения требуется JavaScript.</noscript>
    <div id="app" role="main" aria-label="OmniMind Core Dashboard"></div>

    <!-- Vite entry-point -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
