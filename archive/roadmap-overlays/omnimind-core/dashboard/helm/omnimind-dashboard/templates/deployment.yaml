apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnimind-dashboard.fullname" . }}
  labels:
    {{- include "omnimind-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge | default "25%" }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "omnimind-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "omnimind-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
      annotations:
        {{- if .Values.configMap.name }}
        checksum/config: "{{ include (printf "%s.checksum" .Values.configMap.name) . }}"
        {{- end }}
        {{- if .Values.secret.name }}
        checksum/secret: "{{ include (printf "%s.checksum" .Values.secret.name) . }}"
        {{- end }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port | default .Values.service.port }}"
        prometheus.io/path: "{{ .Values.metrics.path | default "/metrics" }}"
        {{- end }}
    spec:
      serviceAccountName: {{ default (include "omnimind-dashboard.serviceAccountName" .) .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.podSecurity.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.podSecurity.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.podSecurity.fsGroup | default 1000 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      imagePullSecrets:
        {{- if .Values.image.pullSecrets }}
        {{- range .Values.image.pullSecrets }}
        - name: {{ . }}
        {{- end }}
        {{- end }}
      nodeSelector: {{- toYaml .Values.nodeSelector | nindent 6 }}
      tolerations: {{- toYaml .Values.tolerations | nindent 6 }}
      affinity: {{- toYaml .Values.affinity | nindent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 80 }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "{{ .Values.env.NODE_ENV | default "production" }}"
            - name: VITE_API_BASE
              value: "{{ .Values.env.VITE_API_BASE | default "" }}"
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          envFrom:
            {{- if .Values.configMap.name }}
            - configMapRef:
                name: {{ .Values.configMap.name }}
            {{- end }}
            {{- if .Values.secret.name }}
            - secretRef:
                name: {{ .Values.secret.name }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.health.readinessPath | default "/healthz" }}
              port: {{ .Values.service.port | default 80 }}
            initialDelaySeconds: {{ .Values.health.readinessInitialDelay | default 5 }}
            periodSeconds: {{ .Values.health.readinessPeriod | default 10 }}
            failureThreshold: {{ .Values.health.readinessFailureThreshold | default 3 }}
            timeoutSeconds: {{ .Values.health.readinessTimeout | default 2 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.livenessPath | default "/healthz" }}
              port: {{ .Values.service.port | default 80 }}
            initialDelaySeconds: {{ .Values.health.livenessInitialDelay | default 30 }}
            periodSeconds: {{ .Values.health.livenessPeriod | default 20 }}
            failureThreshold: {{ .Values.health.livenessFailureThreshold | default 6 }}
            timeoutSeconds: {{ .Values.health.livenessTimeout | default 3 }}
          startupProbe:
            httpGet:
              path: {{ .Values.health.startupPath | default "/ready" }}
              port: {{ .Values.service.port | default 80 }}
            initialDelaySeconds: {{ .Values.health.startupInitialDelay | default 10 }}
            periodSeconds: {{ .Values.health.startupPeriod | default 10 }}
            failureThreshold: {{ .Values.health.startupFailureThreshold | default 30 }}
            timeoutSeconds: {{ .Values.health.startupTimeout | default 3 }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "200m" }}
              memory: {{ .Values.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "1000m" }}
              memory: {{ .Values.resources.limits.memory | default "1024Mi" }}
          volumeMounts:
            {{- if .Values.config.volumeMounts }}
            {{- toYaml .Values.config.volumeMounts | nindent 12 }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "{{ .Values.lifecycle.preStopCommand | default "sleep 5" }}"]
      volumes:
        {{- if .Values.config.volumes }}
        {{- toYaml .Values.config.volumes | nindent 8 }}
        {{- end }}
