{{- /*
Production-grade Service template for Omnimind Dashboard
Usage: configure values.service.* in values.yaml
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnimind-dashboard.fullname" . }}
  labels:
    {{- include "omnimind-dashboard.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.service.annotations }}
    {{- toYaml .Values.service.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP }}
  {{- end }}

  type: {{ default "ClusterIP" .Values.service.type | quote }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP | quote }}
  {{- end }}

  selector:
    app.kubernetes.io/name: {{ include "omnimind-dashboard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

  {{- if .Values.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  {{- end }}

  {{- if .Values.service.sessionAffinity }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  {{- end }}

  ports:
    - name: http
      port: {{ .Values.service.port | default 80 }}
      targetPort: {{ .Values.service.targetPort | default .Values.service.port | default 80 }}
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}

    {{- if .Values.service.metrics.enabled }}
    - name: metrics
      port: {{ .Values.service.metrics.port | default 9100 }}
      targetPort: {{ .Values.service.metrics.targetPort | default .Values.service.metrics.port | default 9100 }}
      protocol: TCP
    {{- end }}

  {{- if .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
