{{- /*
Ingress template for omnimind-dashboard
Values used (examples in ANSWERING EXAMPLE below):
ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations: {}
  hosts:
    - host: dashboard.example.com
      paths:
        - path: /
          pathType: Prefix
          service:
            name: omnimind-dashboard
            port: 80
  tls:
    - hosts:
        - dashboard.example.com
      secretName: omnimind-dashboard-tls
  extraHostHeaders: {}
*/ -}}
{{- $root := . -}}
{{- if not .Values.ingress.enabled }}
# Ingress is disabled by values: ingress.enabled=false
{{- else }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "omnimind-dashboard.fullname" $root }}
  labels:
{{- include "omnimind-dashboard.labels" $root | nindent 4 }}
  annotations:
    # Default hardening and production-friendly annotations (can be overridden in values)
    {{- $defaultAnn := dict
        "nginx.ingress.kubernetes.io/proxy-body-size" (default "10m" $root.Values.ingress.proxyBodySize)
        "nginx.ingress.kubernetes.io/proxy-buffer-size" (default "8k" $root.Values.ingress.proxyBufferSize)
        "nginx.ingress.kubernetes.io/proxy-read-timeout" (default "60" $root.Values.ingress.proxyReadTimeout)
        "nginx.ingress.kubernetes.io/proxy-send-timeout" (default "60" $root.Values.ingress.proxySendTimeout)
        "nginx.ingress.kubernetes.io/ssl-redirect" (default "true" $root.Values.ingress.sslRedirect)
        "nginx.ingress.kubernetes.io/force-ssl-redirect" (default "true" $root.Values.ingress.forceSslRedirect)
        "nginx.ingress.kubernetes.io/use-regex" (default "false" $root.Values.ingress.useRegex)
        "external-dns.alpha.kubernetes.io/hostname" (default (join "," $root.Values.ingress.hostnames) (list))
      -}}
    {{- range $k, $v := $defaultAnn }}
    {{ $k }}: "{{ $v }}"
    {{- end }}
    {{- if and $root.Values.ingress.clusterIssuer $root.Values.ingress.tls }}
    cert-manager.io/cluster-issuer: "{{ $root.Values.ingress.clusterIssuer }}"
    {{- end }}
    {{- if $root.Values.ingress.annotations }}
    {{ toYaml $root.Values.ingress.annotations | indent 4 }}
    {{- end }}
spec:
  {{- if $root.Values.ingress.ingressClassName }}
  ingressClassName: {{ $root.Values.ingress.ingressClassName }}
  {{- end }}
  {{- if $root.Values.ingress.tls }}
  tls:
  {{- range $i, $tls := $root.Values.ingress.tls }}
    - secretName: {{ $tls.secretName }}
      hosts:
      {{- range $h := $tls.hosts }}
      - {{ $h | quote }}
      {{- end }}
  {{- end }}
  {{- end }}
  rules:
  {{- if not $root.Values.ingress.hosts }}
  # No hosts configured; create a default rule using chart fullname
  - host: {{ printf "%s.local" (include "omnimind-dashboard.fullname" $root) }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "omnimind-dashboard.fullname" $root }}
            port:
              number: {{ $root.Values.service.port }}
  {{- else }}
  {{- range $idx, $host := $root.Values.ingress.hosts }}
  - host: {{ $host.host | quote }}
    http:
      paths:
      {{- if not $host.paths }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ default (include "omnimind-dashboard.fullname" $root) $root.Values.service.name }}
            port:
              number: {{ $root.Values.service.port }}
      {{- else }}
      {{- range $pidx, $p := $host.paths }}
      - path: {{ default "/" $p.path | quote }}
        pathType: {{ default "Prefix" $p.pathType | quote }}
        backend:
          service:
            name: {{ default (include "omnimind-dashboard.fullname" $root) $p.service.name }}
            port:
              {{- if $p.service.port }}
              number: {{ $p.service.port }}
              {{- else }}
              number: {{ $root.Values.service.port }}
              {{- end }}
      {{- end }}
      {{- end }}
  {{- end }}
  {{- end }}

# Notes:
# - Для SPA важно, чтобы Ingress отдавал /index.html при отсутствии файла: большинство ingress-nginx
#   предпочитает try_files в конфиге; если требуется явный fallback, используйте дополнительную
#   configuration-snippet через ingress.annotations:
#     nginx.ingress.kubernetes.io/configuration-snippet: |
#       try_files $uri $uri/ /index.html;
#
# - Параметры timeout/limits/size указаны выше как значения по умолчанию и могут быть переопределены
#   через values.ingress.annotations или отдельные поля в values.yaml.
{{- end }}
